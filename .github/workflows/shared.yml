name: shared

on:
  pull_request:
  push:
    branches: [main]

jobs:
  proto-staleness:
    name: proto staleness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task proto
      - name: Diff
        run: |
          if ! git diff --exit-code pkg/proto/; then
            echo "::error::Generated proto code is out of date. Run 'task proto' and commit."
            exit 1
          fi

  workspace-integrity:
    name: go.work integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task workspace:check

  pkg-fmt:
    name: gofmt (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task fmt:check -- pkg

  pkg-tidy:
    name: go mod tidy (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - run: task tidy:check -- pkg

  pkg-lint:
    name: golangci-lint (pkg/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: pkg/go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.4.0
      - run: task lint -- pkg

  schema-check:
    name: schema + seed
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -f utils/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -v admin_email=admin@banka.raf -v client_email=petar@primer.raf -f utils/db/seed.sql

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: banka
          POSTGRES_PASSWORD: banka_secret
          POSTGRES_DB: banka
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banka"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/bank/go.mod
      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply schema
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -f utils/db/schema.sql
      - name: Apply seed
        env:
          PGHOST: localhost
          PGPORT: "5432"
          PGUSER: banka
          PGPASSWORD: banka_secret
          PGDATABASE: banka
        run: psql -v ON_ERROR_STOP=1 -v admin_email=admin@banka.raf -v client_email=petar@primer.raf -f utils/db/seed.sql
      - name: Run integration tests
        env:
          DATABASE_URL: postgres://banka:banka_secret@localhost:5432/banka?sslmode=disable
          ACCESS_JWT_SECRET: ci-test-access-secret
          REFRESH_JWT_SECRET: ci-test-refresh-secret
        run: task test:integration -- bank exchange gateway notification user
