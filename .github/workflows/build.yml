name: build-and-push

on:
  push:
    branches: [main, deploy]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      all:
        description: "Rebuild every service (ignore path filter)"
        type: boolean
        default: false

env:
  REGISTRY: registry.urosevicvuk.dev
  PROJECT: raf-banka3

jobs:
  # Same change-detection idea as ci.yml. On a release tag (refs/tags/v*)
  # or manual `all=true`, we force-rebuild every service so a tag produces
  # a complete image set even if the previous push only touched one svc.
  changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.compute.outputs.modules }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        if: ${{ !startsWith(github.ref, 'refs/tags/') && !inputs.all }}
        with:
          filters: |
            user:         'services/user/**'
            bank:         'services/bank/**'
            trading:      'services/trading/**'
            exchange:     'services/exchange/**'
            notification: 'services/notification/**'
            gateway:      'services/gateway/**'
            scheduler:    'services/scheduler/**'
            migrate:
              - 'docker/Dockerfile.migrate'
              - 'docker/run-migrations.sh'
              - 'services/*/migrations/**'
            shared:
              - 'pkg/**'
              - 'proto/**'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'Makefile'
              - 'go.work'
              - 'docker/Dockerfile'
              - '.github/workflows/build.yml'
      - id: compute
        run: |
          all='["user","bank","trading","exchange","notification","gateway","scheduler","migrate"]'
          if [[ '${{ startsWith(github.ref, 'refs/tags/') }}' == 'true' || '${{ inputs.all }}' == 'true' ]]; then
            echo "modules=$all" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          mods='${{ steps.filter.outputs.changes }}'
          if jq -e 'index("shared")' <<<"$mods" >/dev/null; then
            echo "modules=$all" >> "$GITHUB_OUTPUT"
          else
            # drop the 'migrate' marker into the list iff that filter tripped;
            # otherwise keep only per-service names.
            services=$(jq -c '[.[] | select(. != "shared")]' <<<"$mods")
            echo "modules=$services" >> "$GITHUB_OUTPUT"
          fi

  services:
    needs: changes
    if: ${{ needs.changes.outputs.modules != '[]' && needs.changes.outputs.modules != '' }}
    runs-on: ubuntu-latest
    # id-token: write is required by cosign for keyless (Fulcio) signing:
    # cosign exchanges this token with the OIDC provider at
    # token.actions.githubusercontent.com to mint a short-lived cert
    # whose Subject is this workflow's URL.
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to Harbor
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate proto stubs (services only)
        if: matrix.service != 'migrate'
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            bufbuild/buf:1.45.0 generate

      - name: Compute image tags
        id: tags
        run: |
          base="${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}"
          tags="$base:${{ github.sha }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            tags="$tags"$'\n'"$base:main"
          fi
          if [[ "${{ github.ref }}" == "refs/heads/rewrite" ]]; then
            tags="$tags"$'\n'"$base:rewrite"
          fi
          if [[ "${{ github.ref }}" == "refs/heads/deploy" ]]; then
            tags="$tags"$'\n'"$base:deploy"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            tags="$tags"$'\n'"$base:${GITHUB_REF#refs/tags/}"
            tags="$tags"$'\n'"$base:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push ${{ matrix.service }}
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.service == 'migrate' && 'docker/Dockerfile.migrate' || 'docker/Dockerfile' }}
          build-args: |
            ${{ matrix.service != 'migrate' && format('SERVICE={0}', matrix.service) || '' }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        # Keyless signing: cosign requests an OIDC token from GitHub
        # Actions (id-token: write permission above), Fulcio mints a
        # short-lived cert whose Subject is this workflow's URL, the
        # signature + cert are pushed to the registry alongside the
        # image manifest, and the bundle is recorded in Rekor for
        # transparency. Verification (cluster-side Kyverno policy)
        # matches on Subject + OIDC issuer — no public key to manage.
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}@${{ steps.build.outputs.digest }}"

  # Bump overlays/dev/kustomization.yaml in Banka-3-Infrastructure to
  # the commit SHA we just built — that's the continuous-deployment
  # mechanism for the dev environment. Argo CD watches the dev overlay
  # on main; the commit this job lands becomes the next dev sync.
  #
  # Only runs on main-branch pushes. PRs, tags, and other branches
  # don't bump dev — prod is bumped manually by editing overlays/prod
  # behind a release tag.
  #
  # Requires INFRA_REPO_TOKEN secret: a fine-grained PAT (or GitHub
  # App installation token) with `contents: write` on the
  # Banka-3-Infrastructure repo. GITHUB_TOKEN doesn't have cross-repo
  # write access by default.
  bump-dev-manifests:
    needs: [changes, services]
    if: ${{ github.ref == 'refs/heads/main' && needs.services.result == 'success' && needs.changes.outputs.modules != '[]' && needs.changes.outputs.modules != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v6
        with:
          repository: RAF-SI-2025/Banka-3-Infrastructure
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          ref: main

      - name: Install yq
        run: |
          sudo curl -sSfL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Bump image tags for built services
        env:
          MODULES: ${{ needs.changes.outputs.modules }}
          SHA: ${{ github.sha }}
        run: |
          # MODULES is a JSON array like ["user","bank","migrate"]. For
          # each, swap the matching entry's newTag in overlays/dev/
          # kustomization.yaml. yq selects by .name so re-ordering the
          # block doesn't break the bump.
          for svc in $(echo "$MODULES" | jq -r '.[]'); do
            echo "bumping $svc → $SHA"
            yq -i "(.images[] | select(.name == \"registry.urosevicvuk.dev/raf-banka3/${svc}\")).newTag = \"${SHA}\"" \
              overlays/dev/kustomization.yaml
          done

      - name: Commit and push
        env:
          SHA: ${{ github.sha }}
          MODULES: ${{ needs.changes.outputs.modules }}
        run: |
          git config user.name  "banka-ci"
          git config user.email "ci@raf-project.com"
          git add overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No manifest changes (likely a re-run); nothing to push."
            exit 0
          fi
          # Pull --rebase to absorb any concurrent dev bumps from a
          # second pipeline that landed between our checkout and push.
          # Retry once if the push still races — a failure after that
          # is genuine (auth, missing branch protection bypass, etc.)
          # and we want CI to fail loud.
          git commit -m "ci(dev): bump ${MODULES} → ${SHA:0:8}

Origin: ${{ github.server_url }}/${{ github.repository }}/commit/${SHA}"
          for attempt in 1 2; do
            if git push origin main; then
              exit 0
            fi
            echo "push failed (attempt $attempt); rebasing and retrying"
            git pull --rebase origin main
          done
          echo "push failed after retries"; exit 1
