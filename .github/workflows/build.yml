name: build-and-push

on:
  push:
    branches: [main, rewrite]
  workflow_dispatch:

env:
  REGISTRY: registry.urosevicvuk.dev
  PROJECT: raf-banka3

jobs:
  services:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [user, bank, trading, exchange, notification, gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Generate proto stubs
        # Services COPY gen/ into the image; the .dockerignore in this
        # repo excludes gen/, so generate fresh in CI before the build.
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            bufbuild/buf:1.45.0 generate

      - name: Build + push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}:main
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max

  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}
      - name: Build + push migrate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.migrate
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/migrate:main
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/migrate:${{ github.sha }}
          cache-from: type=gha,scope=migrate
          cache-to:   type=gha,scope=migrate,mode=max
