syntax = "proto3";

package user;

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";

option go_package = "user-service/pb/";

service UserService {
  rpc CreateEmployee(CreateEmployeeRequest) returns (EmployeeResponse) {
    option (google.api.http) = {
      post: "/v1/employees"
      body: "*"
    };
  }
  rpc GetEmployee(GetEmployeeRequest) returns (EmployeeResponse) {
    option (google.api.http) = {
      get: "/v1/employees/{id}"
    };
  }
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse) {
    option (google.api.http) = {
      get: "/v1/employees"
    };
  }
  rpc UpdateEmployee(UpdateEmployeeRequest) returns (EmployeeResponse) {
    option (google.api.http) = {
      put: "/v1/employees/{id}"
      body: "*"
    };
  }
  rpc DeleteEmployee(DeleteEmployeeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/employees/{id}"
    };
  }

  rpc CreateClient(CreateClientRequest) returns (ClientResponse) {
    option (google.api.http) = {
      post: "/v1/clients"
      body: "*"
    };
  }
  rpc GetClient(GetClientRequest) returns (ClientResponse) {
    option (google.api.http) = {
      get: "/v1/clients/{id}"
    };
  }
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse) {
    option (google.api.http) = {
      get: "/v1/clients"
    };
  }
  rpc UpdateClient(UpdateClientRequest) returns (ClientResponse) {
    option (google.api.http) = {
      put: "/v1/clients/{id}"
      body: "*"
    };
  }
  rpc DeleteClient(DeleteClientRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v1/clients/{id}"
    };
  }

  rpc CreatePermission(CreatePermissionRequest) returns (PermissionResponse) {
    option (google.api.http) = {
      post: "/v1/permissions"
      body: "*"
    };
  }
  rpc ListPermissions(google.protobuf.Empty) returns (ListPermissionsResponse) {
    option (google.api.http) = {
      get: "/v1/permissions"
    };
  }
}

message Permission {
  uint64 id = 1;
  string name = 2;
  string description = 3;
}

message Employee {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string username = 5;
  string position = 6;
  string department = 7;
  string phone_number = 8;
  string address = 9;
  bool active = 10;
  string gender = 11;
  string date_of_birth = 12;
  repeated Permission permissions = 13;
}

message CreateEmployeeRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string username = 4;
  string position = 5;
  string department = 6;
  string phone_number = 7;
  string address = 8;
  bool active = 9;
  string gender = 10;
  string date_of_birth = 11;
  repeated uint64 permission_ids = 12;
}

message GetEmployeeRequest { uint64 id = 1; }

message UpdateEmployeeRequest {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string position = 5;
  string department = 6;
  string phone_number = 7;
  string address = 8;
  bool active = 9;
  repeated uint64 permission_ids = 10;
}

message DeleteEmployeeRequest { uint64 id = 1; }
message EmployeeResponse { Employee employee = 1; }
message ListEmployeesRequest { int32 page = 1; int32 page_size = 2; }
message ListEmployeesResponse { repeated Employee employees = 1; int32 total = 2; }

message Client {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
  string connected_accounts = 9;
}

message CreateClientRequest {
  string first_name = 1;
  string last_name = 2;
  int64 date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone_number = 6;
  string address = 7;
}

message GetClientRequest { uint64 id = 1; }

message UpdateClientRequest {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone_number = 5;
  string address = 6;
  string gender = 7;
}

message DeleteClientRequest { uint64 id = 1; }
message ClientResponse { Client client = 1; }
message ListClientsRequest { int32 page = 1; int32 page_size = 2; }
message ListClientsResponse { repeated Client clients = 1; int32 total = 2; }

message CreatePermissionRequest {
  string name = 1;
  string description = 2;
}

message PermissionResponse { Permission permission = 1; }
message ListPermissionsResponse { repeated Permission permissions = 1; }