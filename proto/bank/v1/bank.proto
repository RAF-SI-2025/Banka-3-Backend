message ListLoansRequest {
  string client_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string account_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  LoanType loan_type = 3 [(buf.validate.field).enum.defined_only = true];
  LoanStatus status = 4 [(buf.validate.field).enum.defined_only = true];
  int32 page = 5 [(buf.validate.field).int32 = {gte: 0}];
  int32 page_size = 6 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
}

message ListLoansResponse {
  repeated Loan loans = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

message GetLoanRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message RunInstallmentJobRequest {
  // due_on lets the caller process a specific date (YYYY-MM-DD) for
  // testing. Empty → today.
  string due_on = 1 [
    (buf.validate.field).string.pattern = "^\\d{4}-\\d{2}-\\d{2}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

message RunInstallmentJobResponse {
  int32 processed = 1;
  int32 paid = 2;
  int32 overdue = 3;
}

message RunVariableRateJobRequest {}

message RunVariableRateJobResponse {
  int32 updated = 1;
}

message RunMaintenanceFeeJobRequest {
  // as_of lets the caller process a specific date (YYYY-MM-DD) for
  // testing. Empty → now.
  string as_of = 1 [
    (buf.validate.field).string.pattern = "^\\d{4}-\\d{2}-\\d{2}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

message RunMaintenanceFeeJobResponse {
  int32 processed = 1;
  int32 charged = 2;
  int32 skipped = 3;
}

message RunSpentResetJobRequest {}

message RunSpentResetJobResponse {
  int64 daily = 1;
  int64 monthly = 2;
}
