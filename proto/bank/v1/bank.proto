syntax = "proto3";

package banka.bank.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// BankService owns the c2 banking entities: companies, accounts (and
// later cards, payments, transfers, exchange, loans). The slice 1
// surface here is companies + accounts (incl. system house accounts);
// payment/card/loan RPCs land in subsequent slices.
//
// Public REST surface: every RPC with a google.api.http annotation is
// exposed on the gateway at /api/v1/...
service BankService {
  // -----------------------------------------------------------------
  // Companies (Firma) — needed for poslovni accounts (spec p.14)
  // -----------------------------------------------------------------

  rpc CreateCompany(CreateCompanyRequest) returns (Company) {
    option (google.api.http) = {
      post: "/api/v1/companies"
      body: "*"
    };
  }

  rpc ListCompanies(ListCompaniesRequest) returns (ListCompaniesResponse) {
    option (google.api.http) = {get: "/api/v1/companies"};
  }

  rpc GetCompany(GetCompanyRequest) returns (Company) {
    option (google.api.http) = {get: "/api/v1/companies/{id}"};
  }

  rpc UpdateCompany(UpdateCompanyRequest) returns (Company) {
    option (google.api.http) = {
      patch: "/api/v1/companies/{id}"
      body: "*"
    };
  }

  // -----------------------------------------------------------------
  // Accounts
  // -----------------------------------------------------------------
  //
  // Spec p.11 "Kreiranje računa klijenta": the employee creates the
  // account on behalf of a client, picking Tekući (RSD only) or Devizni
  // (one of EUR/CHF/USD/GBP/JPY/CAD/AUD), Lični (with subtype) or
  // Poslovni (linked to a Company). Optional opening balance and an
  // "auto-create card" flag (handled by caller in slice 2+).

  rpc CreateAccount(CreateAccountRequest) returns (Account) {
    option (google.api.http) = {
      post: "/api/v1/accounts"
      body: "*"
    };
  }

  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse) {
    option (google.api.http) = {get: "/api/v1/accounts"};
  }

  rpc GetAccount(GetAccountRequest) returns (Account) {
    option (google.api.http) = {get: "/api/v1/accounts/{id}"};
  }

  rpc UpdateAccountLimits(UpdateAccountLimitsRequest) returns (Account) {
    option (google.api.http) = {
      patch: "/api/v1/accounts/{id}/limits"
      body: "*"
    };
  }

  // UpdateAccountName implements spec p.20 "Promena naziva računa".
  // Only the account owner may rename. The new name must differ from
  // the current name and must not collide with another active account
  // owned by the same client. No verification gate — renaming doesn't
  // move money, and the spec p.20 popup doesn't require a code (only
  // limit changes do).
  rpc UpdateAccountName(UpdateAccountNameRequest) returns (Account) {
    option (google.api.http) = {
      patch: "/api/v1/accounts/{id}/name"
      body: "*"
    };
  }

  rpc SetAccountStatus(SetAccountStatusRequest) returns (Account) {
    option (google.api.http) = {
      post: "/api/v1/accounts/{id}/status"
      body: "*"
    };
  }

  // -----------------------------------------------------------------
  // Internal RPCs (no HTTP annotation)
  // -----------------------------------------------------------------

  // GetSystemAccount returns the bank's own house account for a given
  // currency. Used by exchange/payment code paths so all FX flows
  // through bank-owned accounts (spec edge case: every FX conversion
  // hops through the bank in RSD twice).
  rpc GetSystemAccount(GetSystemAccountRequest) returns (Account);

  // SettleTrade is the trading service's settlement primitive. Each
  // partial fill (spec p.55-56) calls this to move money between the
  // user's bank account and the bank's house account in the security's
  // listing currency. Same-currency = single leg; FX = two legs via
  // the menjačnica engine. Bank does no commission math here — the
  // caller has already net-bundled commission into `amount`.
  rpc SettleTrade(SettleTradeRequest) returns (SettleTradeResponse);

  // SettleCapitalGainsTax debits the user's trading account and credits
  // the state's RSD account by `amount_rsd` (spec p.62). The RPC takes
  // the RSD figure directly; bank inverts the menjačnica engine to
  // pull the matching source-currency amount from the user's account
  // (commission-free per spec p.62, regardless of actor type). Idempotent
  // on `op_id`. Internal RPC — no http annotation, callers authenticate
  // with admin metadata.
  rpc SettleCapitalGainsTax(SettleCapitalGainsTaxRequest) returns (SettleCapitalGainsTaxResponse);

  // SettleForexFill atomically settles the two paired cash legs of a
  // forex pair fill (spec p.42). Each leg moves the bank's per-currency
  // forex_book account against the per-currency menjačnica house. The
  // forex_book represents the bank's open FX positions and acts as the
  // conceptual "market" counterparty. Idempotent on `op_id`. Internal
  // RPC — no http annotation, callers authenticate with admin metadata.
  rpc SettleForexFill(SettleForexFillRequest) returns (SettleForexFillResponse);

  // ReserveFunds debits the source account's available_balance (leaving
  // balance untouched) and inserts a `held` reservation row. Used by
  // the c4 SAGA orchestrator as step 1 of OTC premium / OTC exercise /
  // fund-invest / fund-withdraw flows. Idempotent on op_id — a retry
  // returns the existing reservation rather than double-debiting.
  rpc ReserveFunds(ReserveFundsRequest) returns (ReserveFundsResponse);

  // ReleaseFunds re-credits available_balance and flips the reservation
  // row to `released`. Compensating step in every SAGA that calls
  // ReserveFunds. No-op (success) when the reservation is already
  // released or never existed — SAGA compensations need to be
  // idempotent and runnable out-of-order from the failed forward step.
  rpc ReleaseFunds(ReleaseFundsRequest) returns (ReleaseFundsResponse);

  // CommitReservedFunds finalises a held reservation: in one tx debits
  // `balance` on the source (available_balance already debited at
  // reserve time), credits the destination's balance + available_balance,
  // and flips the reservation row to `committed`. Cross-currency
  // commits hop through the bank's house accounts (same menjačnica
  // convention as SettleTrade). Idempotent on op_id.
  rpc CommitReservedFunds(CommitReservedFundsRequest) returns (CommitReservedFundsResponse);

  // TransferBetweenClients is the convenience wrapper composing
  // ReserveFunds + CommitReservedFunds when no FX hop is needed (or
  // when the caller wants the bank to handle the FX hop internally).
  // Used by OTC premium + OTC exercise + fund invest/withdraw whenever
  // both legs are in compatible currencies. `is_actuary` toggles the
  // FX commission off (spec p.55 actuary path); op_kind tags the
  // ledger leg so reporting (Profit Banke + pregled plaćanja) can
  // distinguish OTC vs fund flows.
  rpc TransferBetweenClients(TransferBetweenClientsRequest) returns (TransferBetweenClientsResponse);

  // CreateFundAccount mints a kind='fund' RSD account owned by the
  // FundsOwnerID sentinel. Trading service dials this internally at
  // CreateFund time. Distinct from CreateAccount so the client-facing
  // path can keep rejecting kind=fund as a validation error.
  rpc CreateFundAccount(CreateFundAccountRequest) returns (Account);

  // -----------------------------------------------------------------
  // Payments — Klijent → another Klijent (different owner). Spec
  // p.21 "Novo plaćanje". Same-currency intra-bank: 1 transaction
  // leg. FX: 2-3 legs through bank house accounts (menjačnica).
  // -----------------------------------------------------------------

  rpc CreatePayment(CreatePaymentRequest) returns (PaymentResult) {
    option (google.api.http) = {
      post: "/api/v1/payments"
      body: "*"
    };
  }

  // -----------------------------------------------------------------
  // Transfers — Klijent → own account. Spec p.23 "Prenos". Same
  // currency = direct. Different currencies = menjačnica logic.
  // -----------------------------------------------------------------

  rpc CreateTransfer(CreateTransferRequest) returns (PaymentResult) {
    option (google.api.http) = {
      post: "/api/v1/transfers"
      body: "*"
    };
  }

  // QuoteExchange returns the converted-amount preview for a
  // menjačnica or FX payment, including commission. The FE uses this
  // to render the transfer-confirmation screen before the user clicks
  // Potvrdi.
  rpc QuoteExchange(QuoteExchangeRequest) returns (QuoteExchangeResponse) {
    option (google.api.http) = {
      post: "/api/v1/menjacnica/quote"
      body: "*"
    };
  }

  // -----------------------------------------------------------------
  // Transactions ledger — pregled plaćanja
  // -----------------------------------------------------------------

  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse) {
    option (google.api.http) = {get: "/api/v1/transactions"};
  }

  // -----------------------------------------------------------------
  // Payment recipient templates ("Primaoci plaćanja", spec p.23)
  // -----------------------------------------------------------------

  rpc CreatePaymentRecipient(CreatePaymentRecipientRequest) returns (PaymentRecipient) {
    option (google.api.http) = {
      post: "/api/v1/payment-recipients"
      body: "*"
    };
  }
  rpc ListPaymentRecipients(ListPaymentRecipientsRequest) returns (ListPaymentRecipientsResponse) {
    option (google.api.http) = {get: "/api/v1/payment-recipients"};
  }
  rpc UpdatePaymentRecipient(UpdatePaymentRecipientRequest) returns (PaymentRecipient) {
    option (google.api.http) = {
      patch: "/api/v1/payment-recipients/{id}"
      body: "*"
    };
  }
  rpc DeletePaymentRecipient(DeletePaymentRecipientRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/api/v1/payment-recipients/{id}"};
  }

  // -----------------------------------------------------------------
  // Scheduled payments — "Zakazivanje plaćanja" (todoSpec C2). A
  // one-time future-dated intra-bank payment. Scheduling is
  // verification-gated at the gateway (same 6-digit dialog as a normal
  // payment); the central scheduler's bank-scheduled-payments sweep
  // executes due rows. The client can list + cancel before execution.
  // -----------------------------------------------------------------

  rpc SchedulePayment(SchedulePaymentRequest) returns (ScheduledPayment) {
    option (google.api.http) = {
      post: "/api/v1/scheduled-payments"
      body: "*"
    };
  }
  rpc ListScheduledPayments(ListScheduledPaymentsRequest) returns (ListScheduledPaymentsResponse) {
    option (google.api.http) = {get: "/api/v1/scheduled-payments"};
  }
  rpc CancelScheduledPayment(CancelScheduledPaymentRequest) returns (ScheduledPayment) {
    option (google.api.http) = {delete: "/api/v1/scheduled-payments/{id}"};
  }

  // RunDueScheduledPayments attempts execution of every scheduled
  // payment whose date has arrived. Normally driven by the scheduler
  // service; admin-only. Internal — no http annotation.
  rpc RunDueScheduledPayments(RunDueScheduledPaymentsRequest) returns (RunDueScheduledPaymentsResponse);

  // -----------------------------------------------------------------
  // Cards
  // -----------------------------------------------------------------

  rpc CreateCard(CreateCardRequest) returns (Card) {
    option (google.api.http) = {
      post: "/api/v1/cards"
      body: "*"
    };
  }
  rpc ListCards(ListCardsRequest) returns (ListCardsResponse) {
    option (google.api.http) = {get: "/api/v1/cards"};
  }
  rpc SetCardStatus(SetCardStatusRequest) returns (Card) {
    option (google.api.http) = {
      post: "/api/v1/cards/{id}/status"
      body: "*"
    };
  }
  // UpdateCardLimit changes a card's per-card spending limit (flow.pdf
  // P6 "Klijent menja limit kartice"). Verification-gated by the
  // gateway middleware — same policy as account-limit changes.
  rpc UpdateCardLimit(UpdateCardLimitRequest) returns (Card) {
    option (google.api.http) = {
      patch: "/api/v1/cards/{id}/limit"
      body: "*"
    };
  }

  // -----------------------------------------------------------------
  // OvlascenoLice (authorized persons on a poslovni account)
  // -----------------------------------------------------------------

  rpc CreateAuthorizedPerson(CreateAuthorizedPersonRequest) returns (AuthorizedPerson) {
    option (google.api.http) = {
      post: "/api/v1/authorized-persons"
      body: "*"
    };
  }
  rpc ListAuthorizedPersons(ListAuthorizedPersonsRequest) returns (ListAuthorizedPersonsResponse) {
    option (google.api.http) = {get: "/api/v1/authorized-persons"};
  }

  // -----------------------------------------------------------------
  // Krediti — loan requests and active loans
  // -----------------------------------------------------------------

  rpc SubmitLoanRequest(SubmitLoanRequestRequest) returns (LoanRequest) {
    option (google.api.http) = {
      post: "/api/v1/loan-requests"
      body: "*"
    };
  }
  rpc ListLoanRequests(ListLoanRequestsRequest) returns (ListLoanRequestsResponse) {
    option (google.api.http) = {get: "/api/v1/loan-requests"};
  }
  rpc DecideLoanRequest(DecideLoanRequestRequest) returns (LoanRequest) {
    option (google.api.http) = {
      post: "/api/v1/loan-requests/{id}/decide"
      body: "*"
    };
  }

  rpc ListLoans(ListLoansRequest) returns (ListLoansResponse) {
    option (google.api.http) = {get: "/api/v1/loans"};
  }
  rpc GetLoan(GetLoanRequest) returns (LoanWithInstallments) {
    option (google.api.http) = {get: "/api/v1/loans/{id}"};
  }

  // RunInstallmentJob debits any installments that are due today.
  // Normally driven by the daily cron; exposed as an RPC so tests and
  // ops can fire it on demand. Admin-only.
  rpc RunInstallmentJob(RunInstallmentJobRequest) returns (RunInstallmentJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/loans/run-installment-job"
      body: "*"
    };
  }

  // RunVariableRateJob refreshes the random pomeraj for every active
  // variable-rate loan and recomputes its installment amount. Admin-only.
  rpc RunVariableRateJob(RunVariableRateJobRequest) returns (RunVariableRateJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/loans/run-variable-rate-job"
      body: "*"
    };
  }

  // RunMaintenanceFeeJob debits the monthly maintenance fee from every
  // account due for it. Normally driven by the scheduler service; exposed
  // as an RPC so ops can fire it on demand. Admin-only.
  rpc RunMaintenanceFeeJob(RunMaintenanceFeeJobRequest) returns (RunMaintenanceFeeJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/accounts/run-maintenance-fee-job"
      body: "*"
    };
  }

  // RunSpentResetJob zeroes the daily/monthly spent counters that are due
  // to roll over. Normally driven by the scheduler service; admin-only.
  rpc RunSpentResetJob(RunSpentResetJobRequest) returns (RunSpentResetJobResponse) {
    option (google.api.http) = {
      post: "/api/v1/accounts/run-spent-reset-job"
      body: "*"
    };
  }
}

// =====================================================================
// Enums
// =====================================================================

enum Currency {
  CURRENCY_UNSPECIFIED = 0;
  CURRENCY_RSD = 1;
  CURRENCY_EUR = 2;
  CURRENCY_CHF = 3;
  CURRENCY_USD = 4;
  CURRENCY_GBP = 5;
  CURRENCY_JPY = 6;
  CURRENCY_CAD = 7;
  CURRENCY_AUD = 8;
}

// AccountKind picks the broad bucket; the trailing TT in the 18-digit
// account number depends on (kind, subtype) per spec p.16. See
// pkg/account.Type for the exact mapping.
enum AccountKind {
  ACCOUNT_KIND_UNSPECIFIED = 0;
  ACCOUNT_KIND_PERSONAL_CHECKING_RSD = 1; // lični tekući RSD  (TT=11/13/14/15/16/17 by subtype)
  ACCOUNT_KIND_PERSONAL_FX = 2; // lični devizni     (TT=21)
  ACCOUNT_KIND_BUSINESS_CHECKING_RSD = 3; // poslovni tekući   (TT=12)
  ACCOUNT_KIND_BUSINESS_FX = 4; // poslovni devizni  (TT=22)
  ACCOUNT_KIND_SYSTEM = 5; // bank-owned house  (TT=99, internal)
  ACCOUNT_KIND_FOREX_BOOK = 6; // bank's per-currency FX inventory book (internal, addressable for actuary trading)
  ACCOUNT_KIND_STATE_TAX = 7; // RSD destination for capital-gains tax remittance (internal)
  ACCOUNT_KIND_FUND = 8; // investment fund's liquidity account (c4 PR3, spec p.74; FundsOwnerID sentinel as owner)
}

// AccountSubtype only applies to Lični Tekući RSD per spec p.12; the
// other kinds leave it UNSPECIFIED. New subtypes append.
enum AccountSubtype {
  ACCOUNT_SUBTYPE_UNSPECIFIED = 0;
  ACCOUNT_SUBTYPE_STANDARD = 1;
  ACCOUNT_SUBTYPE_SAVINGS = 2; // štedni
  ACCOUNT_SUBTYPE_PENSIONER = 3; // penzionerski
  ACCOUNT_SUBTYPE_YOUTH = 4; // za mlade
  ACCOUNT_SUBTYPE_STUDENT = 5; // za studente
  ACCOUNT_SUBTYPE_UNEMPLOYED = 6; // za nezaposlene

  // Business subtypes (apply to Poslovni Tekući RSD).
  ACCOUNT_SUBTYPE_DOO = 10;
  ACCOUNT_SUBTYPE_AD = 11;
  ACCOUNT_SUBTYPE_FOUNDATION = 12; // fondacija
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_INACTIVE = 2;
}

// =====================================================================
// Entities
// =====================================================================

message Company {
  string id = 1;
  string name = 2; // Naziv firme
  string registry_id = 3; // Matični broj firme
  string tax_id = 4; // Poreski broj firme (PIB)
  string activity_code = 5; // Šifra delatnosti (xx.xx)
  string address = 6;
  string owner_client_id = 7; // Vlasnik (Klijent)

  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// Account mirrors spec p.12-13 fields. Money is encoded as a decimal
// string (e.g. "180.00") so we don't lose precision over JSON; the
// bank service stores it as numeric(20,4).
message Account {
  string id = 1;
  string number = 2; // 18-digit account number
  string name = 3; // Naziv računa
  string owner_client_id = 4; // Klijent (always present)
  string company_id = 5; // set when poslovni
  string created_by_employee_id = 6;

  AccountKind kind = 7;
  AccountSubtype subtype = 8;
  Currency currency = 9;
  AccountStatus status = 10;

  string balance = 11; // Stanje
  string available_balance = 12; // Raspoloživo stanje
  string maintenance_fee = 13; // Održavanje računa (monthly)
  string daily_limit = 14;
  string monthly_limit = 15;
  string daily_spent = 16;
  string monthly_spent = 17;

  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp expires_at = 19;
  google.protobuf.Timestamp updated_at = 20;
}

// =====================================================================
// Company messages
// =====================================================================

message CreateCompanyRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  // Matični broj is exactly 8 digits per Serbian APR.
  string registry_id = 2 [(buf.validate.field).string.pattern = "^[0-9]{8}$"];
  // PIB is exactly 9 digits.
  string tax_id = 3 [(buf.validate.field).string.pattern = "^[0-9]{9}$"];
  // Šifra delatnosti is "xx.xx" or "xx.x" (spec p.14).
  string activity_code = 4 [(buf.validate.field).string.pattern = "^[0-9]{2}\\.[0-9]{1,2}$"];
  string address = 5 [(buf.validate.field).string = {
    min_len: 1
    max_len: 200
  }];
  string owner_client_id = 6 [(buf.validate.field).string.uuid = true];
}

message ListCompaniesRequest {
  string name_query = 1 [(buf.validate.field).string.max_len = 128];
  string registry_id_query = 2 [(buf.validate.field).string.max_len = 16];
  int32 page = 3 [(buf.validate.field).int32 = {gte: 0}];
  int32 page_size = 4 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
}

message ListCompaniesResponse {
  repeated Company companies = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

message GetCompanyRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message UpdateCompanyRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [(buf.validate.field).string.max_len = 200];
  string activity_code = 3 [
    (buf.validate.field).string.pattern = "^[0-9]{2}\\.[0-9]{1,2}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string address = 4 [(buf.validate.field).string.max_len = 200];
  string owner_client_id = 5 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

// =====================================================================
// Account messages
// =====================================================================

message CreateAccountRequest {
  string owner_client_id = 1 [(buf.validate.field).string.uuid = true];
  // Required for ACCOUNT_KIND_BUSINESS_*; UUID format when set.
  string company_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  AccountKind kind = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [
      0,
      5,
      6,
      7
    ]
  }]; // forbid UNSPECIFIED + SYSTEM/FOREX_BOOK/STATE_TAX (internal-only)
  AccountSubtype subtype = 4 [(buf.validate.field).enum.defined_only = true];
  Currency currency = 5 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string name = 6 [(buf.validate.field).string.max_len = 100];
  // Decimal string with up to 4 fraction digits; "0" if absent. Match
  // the storage scale so we don't quietly truncate.
  string opening_balance = 7 [
    (buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  bool create_card = 8;
}

message ListAccountsRequest {
  string owner_client_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  AccountKind kind = 2 [(buf.validate.field).enum.defined_only = true];
  Currency currency = 3 [(buf.validate.field).enum.defined_only = true];
  AccountStatus status = 4 [(buf.validate.field).enum.defined_only = true];
  int32 page = 5 [(buf.validate.field).int32 = {gte: 0}];
  int32 page_size = 6 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
}

message ListAccountsResponse {
  repeated Account accounts = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

message GetAccountRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message UpdateAccountLimitsRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string daily_limit = 2 [
    (buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string monthly_limit = 3 [
    (buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

message UpdateAccountNameRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  // Spec p.20 doesn't pin a length; we cap at 64 to keep the column
  // bounded and the UI tidy. Min 1 because empty would defeat the
  // "must differ from current" rule.
  string name = 2 [(buf.validate.field).string = {
    min_len: 1
    max_len: 64
  }];
}

message SetAccountStatusRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  AccountStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// =====================================================================
// Internal messages
// =====================================================================

message GetSystemAccountRequest {
  Currency currency = 1;
}

message CreateFundAccountRequest {
  // Display name shown on the account row (spec p.74). Defaults to
  // "Račun investicionog fonda" when empty.
  string name = 1 [(buf.validate.field).string.max_len = 120];
  // Currency. RSD only for c4 PR3 (the fund holds a single RSD
  // liquidity account; FX hops to/from it via the reservation engine
  // when invest/withdraw cross currencies).
  Currency currency = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

// SettleTradeRequest moves money between a user's bank account and the
// bank's house account in `currency`. Direction "debit" pulls money
// out of the user (a buy fill); "credit" pushes money into the user
// (a sell fill). The user's account currency may differ from
// `currency`; the FX leg goes through the menjačnica engine. When
// `is_actuary` is true the FX leg is commission-free per spec p.26.
message SettleTradeRequest {
  string account_id = 1 [(buf.validate.field).string.uuid = true];
  string direction = 2 [(buf.validate.field).string.min_len = 1]; // "debit"|"credit"
  Currency currency = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string amount = 4 [(buf.validate.field).string.min_len = 1];
  string op_id = 5 [(buf.validate.field).string.uuid = true];
  bool is_actuary = 6;
  string purpose = 7;
}

message SettleTradeResponse {
  string op_id = 1;
  repeated Transaction transactions = 2;
}

// SettleCapitalGainsTaxRequest debits an `amount_rsd` worth of money
// from the user's `account_id` (in any currency — bank inverts the
// menjačnica engine if needed) and credits the state's RSD account.
message SettleCapitalGainsTaxRequest {
  string account_id = 1 [(buf.validate.field).string.uuid = true];
  string amount_rsd = 2 [(buf.validate.field).string.min_len = 1];
  string op_id = 3 [(buf.validate.field).string.uuid = true];
  string purpose = 4;
}

message SettleCapitalGainsTaxResponse {
  string op_id = 1;
  repeated Transaction transactions = 2;
}

// SettleForexFillRequest pairs the two cash legs of a forex pair fill
// (spec p.42). `direction` is "buy" or "sell" of the base currency.
// Both `*_amount` strings are in their respective currency.
message SettleForexFillRequest {
  string direction = 1 [(buf.validate.field).string = {
    in: [
      "buy",
      "sell"
    ]
  }];
  Currency base_currency = 2 [(buf.validate.field).enum.defined_only = true];
  string base_amount = 3 [(buf.validate.field).string.min_len = 1];
  Currency quote_currency = 4 [(buf.validate.field).enum.defined_only = true];
  string quote_amount = 5 [(buf.validate.field).string.min_len = 1];
  string op_id = 6 [(buf.validate.field).string.uuid = true];
  string purpose = 7;
}

message SettleForexFillResponse {
  string op_id = 1;
  repeated Transaction transactions = 2;
}

// =====================================================================
// c4 reservation primitives
// =====================================================================

// ReserveFundsRequest: pre-debit `available_balance` on `account_id`
// by `amount` in the account's currency. `op_kind` tags the ledger
// row when the reservation later commits or releases (one of
// "otc_premium", "otc_exercise", "fund_invest", "fund_withdraw").
message ReserveFundsRequest {
  string account_id = 1 [(buf.validate.field).string.uuid = true];
  string amount = 2 [(buf.validate.field).string.min_len = 1];
  Currency currency = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string op_id = 4 [(buf.validate.field).string.uuid = true];
  string op_kind = 5 [(buf.validate.field).string.min_len = 1];
}

message ReserveFundsResponse {
  string reservation_id = 1;
  string op_id = 2;
}

message ReleaseFundsRequest {
  string op_id = 1 [(buf.validate.field).string.uuid = true];
}

message ReleaseFundsResponse {
  // released=true when this call moved the row from held→released;
  // false when the row was already released or never existed (still
  // a success — SAGA compensations must be idempotent).
  bool released = 1;
}

// CommitReservedFundsRequest finalises the held reservation. The
// reservation must be in `held` state for the call to succeed; a
// committed reservation returns the prior result. `dest_amount` is in
// `dest_currency`; when the held currency differs the bank hops via
// its house accounts using the standard menjačnica engine. `is_actuary`
// suppresses the FX commission (spec p.55).
message CommitReservedFundsRequest {
  string op_id = 1 [(buf.validate.field).string.uuid = true];
  string dest_account_id = 2 [(buf.validate.field).string.uuid = true];
  string dest_amount = 3 [(buf.validate.field).string.min_len = 1];
  Currency dest_currency = 4 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  bool is_actuary = 5;
  string purpose = 6;
}

message CommitReservedFundsResponse {
  string op_id = 1;
  repeated Transaction transactions = 2;
}

// TransferBetweenClientsRequest debits source, credits destination, in
// one logical operation (the wrapper internally drives Reserve +
// Commit). For same-currency endpoints this is a single ledger leg;
// for cross-currency the menjačnica engine fires the standard two
// legs through the bank's house. `op_kind` is one of "otc_premium",
// "otc_exercise", "fund_invest", "fund_withdraw" — used both for
// transactions.op_kind tagging and for the FX-commission gate.
message TransferBetweenClientsRequest {
  string from_account_id = 1 [(buf.validate.field).string.uuid = true];
  string to_account_id = 2 [(buf.validate.field).string.uuid = true];
  string amount = 3 [(buf.validate.field).string.min_len = 1];
  string op_id = 4 [(buf.validate.field).string.uuid = true];
  string op_kind = 5 [(buf.validate.field).string.min_len = 1];
  bool is_actuary = 6;
  string purpose = 7;
}

message TransferBetweenClientsResponse {
  string op_id = 1;
  repeated Transaction transactions = 2;
}

// =====================================================================
// Payments / transfers / transactions
// =====================================================================

enum TransactionStatus {
  TRANSACTION_STATUS_UNSPECIFIED = 0;
  TRANSACTION_STATUS_REALIZED = 1;
  TRANSACTION_STATUS_REJECTED = 2;
  TRANSACTION_STATUS_PROCESSING = 3;
}

enum TransactionKind {
  TRANSACTION_KIND_UNSPECIFIED = 0;
  TRANSACTION_KIND_PAYMENT = 1;
  TRANSACTION_KIND_TRANSFER = 2;
  TRANSACTION_KIND_EXCHANGE = 3; // intermediate leg in a menjačnica path
  TRANSACTION_KIND_FEE = 4;
  TRANSACTION_KIND_TRADE = 5; // trading-service fill settlement
  TRANSACTION_KIND_TAX = 6; // capital-gains tax debit (spec p.62)
  TRANSACTION_KIND_FOREX_FILL = 7; // forex pair fill (spec p.42)
  // c4 — OTC + funds money-moving categories.
  TRANSACTION_KIND_OTC_PREMIUM = 8;
  TRANSACTION_KIND_OTC_EXERCISE = 9;
  TRANSACTION_KIND_FUND_INVEST = 10;
  TRANSACTION_KIND_FUND_WITHDRAW = 11;
  TRANSACTION_KIND_LOAN_DISBURSEMENT = 12;
  TRANSACTION_KIND_LOAN_INSTALLMENT = 13;
}

// Transaction is one ledger leg. UX-level operations (a payment, a
// transfer) are reconstructed by grouping on op_id.
message Transaction {
  string id = 1;
  string op_id = 2;
  TransactionKind kind = 3;
  int32 leg_index = 4;
  string from_account_id = 5;
  string to_account_id = 6;
  string from_amount = 7; // decimal string
  string to_amount = 8;
  string rate = 9; // decimal string; "" when same currency
  string recipient_name = 10;
  string payment_code = 11;
  string reference_number = 12;
  string purpose = 13;
  string initiator_client_id = 14;
  TransactionStatus status = 15;
  google.protobuf.Timestamp created_at = 16;
  // The 18-digit account numbers behind from/to_account_id, resolved
  // server-side. The FE renders these in the "Drugi račun" column — a
  // client can't (and mustn't be able to) resolve a counterparty
  // account UUID it doesn't own. Empty when the leg's account isn't a
  // locally-held bank account (e.g. a future c5 inter-bank peer).
  string from_account_number = 17;
  string to_account_number = 18;
}

message CreatePaymentRequest {
  string from_account_id = 1 [(buf.validate.field).string.uuid = true];
  // The recipient account is the spec's 18-digit "Račun primaoca". The
  // mod-11 checksum is verified server-side; here we only enforce the
  // shape so obviously-invalid input is rejected at the gateway.
  string to_account_number = 2 [(buf.validate.field).string.pattern = "^[0-9]{18}$"];
  // Positive decimal in from-account currency, up to 4 fraction digits
  // (matching the numeric(20,4) storage).
  string amount = 3 [(buf.validate.field).string.pattern = "^(0*[1-9][0-9]*|[0-9]+\\.[0-9]{1,4}|0\\.0*[1-9][0-9]{0,3})$"];
  string recipient_name = 4 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  // Spec p.21: 3 digits, first one "1" (gotovinska) or "2" (bezgotovinska);
  // online plaćanja uses 2xx. Default 289 is filled in server-side if empty.
  string payment_code = 5 [
    (buf.validate.field).string.pattern = "^[12][0-9]{2}$",
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  string reference_number = 6 [(buf.validate.field).string.max_len = 64];
  string purpose = 7 [(buf.validate.field).string.max_len = 200];
  bool save_recipient = 8;
}

message CreateTransferRequest {
  string from_account_id = 1 [(buf.validate.field).string.uuid = true];
  string to_account_id = 2 [(buf.validate.field).string.uuid = true];
  string amount = 3 [(buf.validate.field).string.pattern = "^(0*[1-9][0-9]*|[0-9]+\\.[0-9]{1,4}|0\\.0*[1-9][0-9]{0,3})$"];
  string purpose = 4 [(buf.validate.field).string.max_len = 200];
}

message PaymentResult {
  // op_id groups the transactions; ListTransactions can filter on it
  // to render a single grouped row in pregled plaćanja.
  string op_id = 1;
  repeated Transaction transactions = 2;
  TransactionStatus status = 3;
}

message QuoteExchangeRequest {
  Currency from = 1 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  Currency to = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  string amount = 3 [(buf.validate.field).string.pattern = "^(0*[1-9][0-9]*|[0-9]+\\.[0-9]{1,4}|0\\.0*[1-9][0-9]{0,3})$"];
  // include_commission: when true the response factors the bank's
  // menjačnica commission. Set to false for the rates calculator
  // page where we just want the raw equivalent.
  bool include_commission = 4;
}

message QuoteExchangeResponse {
  string from_amount = 1; // echoes the request, normalized
  string to_amount = 2; // what the destination account receives
  string rate = 3; // composite rate (one-leg or two-leg)
  string commission = 4; // RSD commission, "0" when same currency
}

message ListTransactionsRequest {
  // account_id filters to legs that touch this account on either side.
  // Empty + employee → see-everything; empty + client → all of caller's
  // accounts.
  string account_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  // 'payment' | 'transfer' | 'exchange' | 'fee' — keep loose, server enforces.
  string op_kind = 2 [(buf.validate.field).string.max_len = 32];
  string status = 3 [(buf.validate.field).string.max_len = 32];
  int32 page = 4 [(buf.validate.field).int32 = {gte: 0}];
  int32 page_size = 5 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
  // Spec p.18 / p.24: "filtriranje po datumu" on Pregled računa +
  // Pregled plaćanja. Both bounds inclusive against
  // transactions.created_at; either may be omitted.
  google.protobuf.Timestamp from = 6;
  google.protobuf.Timestamp to = 7;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
}

// =====================================================================
// Payment recipient templates
// =====================================================================

message PaymentRecipient {
  string id = 1;
  string client_id = 2;
  string name = 3;
  string account_number = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreatePaymentRecipientRequest {
  string name = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 100
  }];
  string account_number = 2 [(buf.validate.field).string.pattern = "^[0-9]{18}$"];
}

message ListPaymentRecipientsRequest {}

message ListPaymentRecipientsResponse {
  repeated PaymentRecipient recipients = 1;
}

message UpdatePaymentRecipientRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string name = 2 [
    (buf.validate.field).string = {
      min_len: 1
