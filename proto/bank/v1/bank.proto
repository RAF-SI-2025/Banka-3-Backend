  int32 succeeded = 2;
  int32 failed = 3;
}

// =====================================================================
// Cards
// =====================================================================

enum CardBrand {
  CARD_BRAND_UNSPECIFIED = 0;
  CARD_BRAND_VISA = 1;
  CARD_BRAND_MASTERCARD = 2;
  CARD_BRAND_DINACARD = 3;
  CARD_BRAND_AMEX = 4;
}

enum CardStatus {
  CARD_STATUS_UNSPECIFIED = 0;
  CARD_STATUS_ACTIVE = 1;
  CARD_STATUS_BLOCKED = 2;
  CARD_STATUS_DEACTIVATED = 3;
}

message Card {
  string id = 1;
  // Number is returned masked ("4111********1111") when the caller is
  // a client; employees with card.write see the full number.
  string number = 2;
  CardBrand brand = 3;
  string name = 4;
  string account_id = 5;
  string authorized_person_id = 6; // empty for personal cards
  string card_limit = 7;
  CardStatus status = 8;
  google.protobuf.Timestamp expires_at = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateCardRequest {
  string account_id = 1 [(buf.validate.field).string.uuid = true];
  // Required for poslovni-with-OvlascenoLice; UUID format when set.
  string authorized_person_id = 2 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
  CardBrand brand = 3 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
  // Name is optional — service layer falls back to a sensible default
  // ("Debit") when blank. Cap is generous; only the upper bound matters.
  string name = 4 [(buf.validate.field).string.max_len = 64];
  // card_limit must be a positive decimal. Pattern enforces shape; the
  // service layer additionally rejects "0" so callers can't bypass via
  // "0.00".
  string card_limit = 5 [(buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$"];
}

message ListCardsRequest {
  string account_id = 1 [
    (buf.validate.field).string.uuid = true,
    (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE
  ];
}

message ListCardsResponse {
  repeated Card cards = 1;
}

message SetCardStatusRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  CardStatus status = 2 [(buf.validate.field).enum = {
    defined_only: true
    not_in: [0]
  }];
}

message UpdateCardLimitRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  // card_limit must be a positive decimal up to 4 fractional digits.
  string card_limit = 2 [(buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$"];
}

