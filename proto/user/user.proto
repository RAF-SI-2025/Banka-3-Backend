syntax = "proto3";

package user;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

option go_package = "gen/user";

// =======================
// SERVICE
// =======================

service UserService {

  // Employees CRUD
  rpc ListEmployees(ListEmployeesRequest) returns (ListEmployeesResponse) {
    option (google.api.http) = {get: "/employees"};
  }

  rpc CreateEmployee(CreateEmployeeRequest) returns (Employee) {
    option (google.api.http) = {post: "/employees" body: "*"};
  }

  rpc GetEmployee(GetEmployeeRequest) returns (Employee) {
    option (google.api.http) = {get: "/employees/{employee_id}"};
  }

  rpc UpdateEmployee(UpdateEmployeeRequest) returns (Employee) {
    option (google.api.http) = {put: "/employees/{employee_id}" body: "*"};
  }

  rpc DeleteEmployee(DeleteEmployeeRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/employees/{employee_id}"};
  }

  // Clients CRUD
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse) {
    option (google.api.http) = {get: "/clients"};
  }

  rpc CreateClient(CreateClientRequest) returns (Client) {
    option (google.api.http) = {post: "/clients" body: "*"};
  }

  rpc GetClient(GetClientRequest) returns (Client) {
    option (google.api.http) = {get: "/clients/{client_id}"};
  }

  rpc UpdateClient(UpdateClientRequest) returns (Client) {
    option (google.api.http) = {put: "/clients/{client_id}" body: "*"};
  }

  rpc DeleteClient(DeleteClientRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/clients/{client_id}"};
  }

  // Permissions
  rpc ListPermissions(google.protobuf.Empty) returns (ListPermissionsResponse) {
    option (google.api.http) = {get: "/permissions"};
  }

}

// =======================
// EMPLOYEE MESSAGES
// =======================

message Employee {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  string date_of_birth = 4;  // yyyy-mm-dd
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
  string username = 9;
  string position = 10;
  string department = 11;
  bool active = 12;
  repeated string permissions = 13;
}

message CreateEmployeeRequest {
  string first_name = 1;
  string last_name = 2;
  string date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone_number = 6;
  string address = 7;
  string username = 8;
  string position = 9;
  string department = 10;
  bool active = 11;
  repeated string permissions = 12;
}

message GetEmployeeRequest {uint64 employee_id = 1;}

message UpdateEmployeeRequest {
  uint64 employee_id = 1;
  string first_name = 2;
  string last_name = 3;
  string date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
  string position = 9;
  string department = 10;
  bool active = 11;
  repeated string permissions = 12;
}

message DeleteEmployeeRequest {uint64 employee_id = 1;}

message ListEmployeesRequest {
  string email = 1;
  string first_name = 2;
  string last_name = 3;
  string position = 4;

  int32 page = 5;       // page number, starts at 1
  int32 page_size = 6;
}


message ListEmployeesResponse {
  repeated Employee employees = 1;
  int64 total = 2; // matching filter
}

// =======================
// CLIENT MESSAGES
// =======================

message Client {
  uint64 id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4; // Unix timestamp
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
  repeated string connected_accounts = 9;
}

message CreateClientRequest {
  string first_name = 1;
  string last_name = 2;
  int64 date_of_birth = 3;
  string gender = 4;
  string email = 5;
  string phone_number = 6;
  string address = 7;
}

message GetClientRequest {uint64 client_id = 1;}

message UpdateClientRequest {
  uint64 client_id = 1;
  string first_name = 2;
  string last_name = 3;
  int64 date_of_birth = 4;
  string gender = 5;
  string email = 6;
  string phone_number = 7;
  string address = 8;
}

message DeleteClientRequest {uint64 client_id = 1;}

message ListClientsRequest {
  int32 page = 1; // starts at 1
  int32 page_size = 2;
}
message ListClientsResponse {
  repeated Client clients = 1;
  int64 total = 2;
}

// =======================
// PERMISSION MESSAGES
// =======================

message Permission {
  uint64 id = 1;
  string name = 2;
  string description = 3;
}


message ListPermissionsResponse {repeated Permission permissions = 1;}
