syntax = "proto3";

package user;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/user";

service TOTPService {
  rpc VerifyCode(VerifyCodeRequest) returns (VerifyCodeResponse);
  rpc CreateTransactionCode(CreateTransactionCodeRequest) returns (CreateTransactionCodeResponse);
  rpc EnrollBegin(EnrollBeginRequest) returns (EnrollBeginResponse);
  rpc EnrollConfirm(EnrollConfirmRequest) returns (EnrollConfirmResponse);
  rpc DisableBegin(DisableBeginRequest) returns (DisableBeginResponse);
  rpc DisableConfirm(DisableConfirmRequest) returns (DisableConfirmResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
}

message VerifyCodeRequest {
  string email = 1;
  string code = 2;
}

message VerifyCodeResponse {
  bool valid = 1;
  int32 remaining_attempts = 2;
  bool transaction_cancelled = 3;
}

message CreateTransactionCodeRequest {
  string email = 1;
}

message CreateTransactionCodeResponse {
  string code = 1;
  int64 valid_until_unix = 2;
  int32 max_attempts = 3;
}

message EnrollBeginRequest {
  string email = 1;
}

message EnrollBeginResponse {
  string url = 1;
}

message EnrollConfirmRequest {
  string email = 1;
  string code = 2;
}

message EnrollConfirmResponse {
  bool success = 1;
  repeated string backup_codes = 2;
}

message DisableBeginRequest {
  string email = 1;
}

message DisableBeginResponse {
  bool success = 1;
}

message DisableConfirmRequest {
  string email = 1;
  string token = 2;
}

message DisableConfirmResponse {
  bool success = 1;
}

message StatusRequest {
  string email = 1;
}

message StatusResponse {
  bool active = 1;
}

message TOTPStatusRequest {
  string email = 1;
}

message TOTPStatusResponse {
  bool active = 1;
}
