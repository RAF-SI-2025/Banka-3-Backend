syntax = "proto3";

package trading;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/pkg/proto/trading";

message ExternalOTCThread {
  string id = 1;
  string direction = 2;
  string remote_bank_code = 3;
  string remote_thread_id = 4;
  string remote_user_ref = 5;
  string remote_display_name = 6;
  string remote_account_ref = 7;
  string local_user_id = 8;
  string local_user_kind = 9;
  string local_account_id = 10;
  string local_account_number = 11;
  string local_role = 12;
  string security_id = 13;
  string security_ticker = 14;
  string seller_holding_id = 15;
  int64 quantity = 16;
  string price_per_unit = 17;
  string premium = 18;
  string currency = 19;
  string settlement_date = 20;
  string modified_by_side = 21;
  string status = 22;
  string created_at = 23;
  string updated_at = 24;
}

message ExternalOTCIteration {
  string id = 1;
  string thread_id = 2;
  string proposed_by_side = 3;
  int64 quantity = 4;
  string price_per_unit = 5;
  string premium = 6;
  string settlement_date = 7;
  string created_at = 8;
}

message ExternalOTCContract {
  string id = 1;
  string thread_id = 2;
  string direction = 3;
  string remote_bank_code = 4;
  string remote_thread_id = 5;
  string remote_user_ref = 6;
  string remote_display_name = 7;
  string remote_account_ref = 8;
  string local_user_id = 9;
  string local_user_kind = 10;
  string local_account_id = 11;
  string local_account_number = 12;
  string local_role = 13;
  string security_id = 14;
  string security_ticker = 15;
  string seller_holding_id = 16;
  int64 quantity = 17;
  string strike_price = 18;
  string premium_paid = 19;
  string currency = 20;
  string settlement_date = 21;
  string accepted_by_side = 22;
  string status = 23;
  string premium_op_id = 24;
  string exercise_op_id = 25;
  string exercised_at = 26;
  string created_at = 27;
  string updated_at = 28;
}

message ListExternalOTCThreadsRequest {
  string status = 1;
}

message ListExternalOTCThreadsResponse {
  repeated ExternalOTCThread threads = 1;
}

message GetExternalOTCThreadRequest {
  string thread_id = 1;
}

message GetExternalOTCThreadResponse {
  ExternalOTCThread thread = 1;
  repeated ExternalOTCIteration iterations = 2;
  ExternalOTCContract contract = 3;
}

message CreateExternalOTCOfferRequest {
  string remote_bank_code = 1;
  string remote_user_ref = 2;
  string remote_display_name = 3;
  string buyer_account_id = 4;
  string seller_holding_id = 5;
  string security_ticker = 6;
  string security_type = 7;
  string currency = 8;
  int64 quantity = 9;
  string price_per_unit = 10;
  string premium = 11;
  string settlement_date = 12;
  string remote_thread_id = 13;
}

message CreateExternalOTCOfferResponse {
  ExternalOTCThread local_mirror = 1;
}

message ExternalOTCActionRequest {
  string bank_code = 1;
  string thread_id = 2;
  int64 quantity = 3;
  string price_per_unit = 4;
  string premium = 5;
  string settlement_date = 6;
}

message ExternalOTCActionResponse {
  ExternalOTCThread thread = 1;
}

message ListExternalOTCContractsRequest {
  string status = 1;
}

message ListExternalOTCContractsResponse {
  repeated ExternalOTCContract contracts = 1;
}

message ExerciseExternalOTCContractRequest {
  string bank_code = 1;
  string contract_id = 2;
  string exercise_op_id = 3;
}

message ExerciseExternalOTCContractResponse {
  ExternalOTCContract contract = 1;
}
