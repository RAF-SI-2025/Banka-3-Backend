// =====================================================================
// Orders
// =====================================================================

message Order {
  string                    id                  = 1;
  string                    user_id             = 2;
  UserKind                  user_kind           = 3;
  string                    security_id         = 4;
  OrderType                 order_type          = 5;
  Direction                 direction           = 6;
  int32                     quantity            = 7;
  string                    contract_size       = 8;
  string                    price_per_unit      = 9;
  string                    limit_price         = 10;
  string                    stop_price          = 11;
  bool                      all_or_none         = 12;
  bool                      margin              = 13;
  string                    account_id          = 14;
  OrderStatus               status              = 15;
  string                    approved_by         = 16;
  bool                      approval_required   = 17;
  google.protobuf.Timestamp approved_at         = 18;
  bool                      is_done             = 19;
  bool                      cancelled           = 20;
  bool                      triggered           = 21;
  bool                      after_hours         = 22;
  int32                     remaining_quantity  = 23;
  google.protobuf.Timestamp last_modification   = 24;
  google.protobuf.Timestamp created_at          = 25;

  // c4 PR3 — actor_kind discriminates whether this order was placed on
  // behalf of the user themselves or for an investment fund they
  // manage. on_behalf_of_fund_id is non-empty when actor_kind == FUND.
  // For backward compat, default actor_kind is whatever user_kind
  // resolved to at create time (client or employee).
  UserKind                  actor_kind           = 26;
  string                    on_behalf_of_fund_id = 27;
}

message CreateOrderRequest {
  string    security_id   = 1  [(buf.validate.field).string.uuid = true];
  OrderType order_type    = 2  [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  Direction direction     = 3  [(buf.validate.field).enum = {defined_only: true, not_in: [0]}];
  int32     quantity      = 4  [(buf.validate.field).int32.gt = 0];
  string    limit_price   = 5;     // optional for LIMIT/STOP_LIMIT
  string    stop_price    = 6;     // optional for STOP/STOP_LIMIT
  bool      all_or_none   = 7;
  bool      margin        = 8;
  string    account_id    = 9  [(buf.validate.field).string.uuid = true];

  // c4 PR3 fund-actor (spec p.74-75). When set, the caller is acting on
  // behalf of an investment fund they manage; the order's owner/account
  // are the fund's. Validated against the fund row (caller is manager,
  // account is fund.bank_account_id). Empty for normal client/employee
  // orders.
  string    on_behalf_of_fund_id = 10 [(buf.validate.field).string.uuid = true, (buf.validate.field).ignore = IGNORE_IF_ZERO_VALUE];
}

// CreateOrderResponse wraps the created Order plus advisory flags. Spec
// p.57 — *"Obavestiti korisnika ako je berza zatvorena"*: the order
// still gets placed, but the FE renders a notice when the security's
// exchange is currently closed (not open and not in the after-hours
// window). For exchanges without a calendar (forex, options) the flag
// is always false.
message CreateOrderResponse {
  Order order            = 1;
  bool  exchange_closed  = 2;
}

message ListOrdersRequest {
  // status: "all", "pending", "approved", "declined", "done".
  string      status      = 1;
  UserKind    user_kind   = 2;       // employee/client filter (supervisor view)
  string      user_id     = 3;       // narrow to a single trader
  string      security_id = 4;
  int32       page        = 10;
  int32       page_size   = 11;
}

message ListOrdersResponse {
  repeated Order orders   = 1;
  int32 page      = 2;
  int32 page_size = 3;
  int64 total     = 4;
}

message GetOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message ApproveOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeclineOrderRequest {
  string id     = 1 [(buf.validate.field).string.uuid = true];
  string reason = 2;
}

message CancelOrderRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

// =====================================================================
// Portfolio
// =====================================================================

message Holding {
  string                    id                 = 1;
  string                    user_id            = 2;
  UserKind                  user_kind          = 3;
  Security                  security           = 4;
  string                    account_id         = 5;
  int32                     quantity           = 6;
  string                    weighted_avg_price = 7;
  int32                     public_count       = 8;
  // Computed market metrics.
  string                    current_price      = 9;
  string                    market_value       = 10;
  string                    profit             = 11;
  google.protobuf.Timestamp acquired_at        = 12;
  google.protobuf.Timestamp updated_at         = 13;
  // c4 (spec p.68) — count of shares committed against outstanding OTC
  // offers + active OTC contracts. public_count and reserved_count are
  // orthogonal; the FE renders public_count − reserved_count as the
  // "available on the OTC board" number.
  int32                     reserved_count     = 14;
}

message ListHoldingsRequest {
  // For supervisor view; clients/agents see only their own.
  string       user_id   = 1;
  UserKind     user_kind = 2;
  SecurityType type      = 3;
}

message ListHoldingsResponse {
  repeated Holding holdings        = 1;
  string           total_profit    = 2;     // user-currency-mixed; FE renders separately
}

message SetPublicCountRequest {
  string id           = 1 [(buf.validate.field).string.uuid = true];
  int32  public_count = 2 [(buf.validate.field).int32.gte = 0];
}

message ExerciseOptionRequest {
  string holding_id = 1 [(buf.validate.field).string.uuid = true];
  // Number of option contracts to exercise. Must be ≥ 1 and
  // ≤ holding.quantity.
  int32  quantity   = 2 [(buf.validate.field).int32.gt = 0];
}

message ExerciseOptionResponse {
  // Updated option holding after the exercise. Quantity may be 0;
  // the row is left in place for audit (FE filters quantity > 0).
  Holding option_holding = 1;
  // Updated underlying holding after the exercise — increased on a
  // CALL, decreased on a PUT.
  Holding underlying_holding = 2;
  // Bank-side op_id of the cash leg, for ops correlation.
  string  bank_op_id = 3;
  // PUT only — realized gain on the underlying shares sold at strike.
  // Both fields are zero for a CALL exercise (cost-basis update via
  // weighted-avg, no realisation event).
  string   realized_gain_native = 4;
  string   realized_gain_rsd    = 5;
  Currency realized_gain_currency = 6;
}

// =====================================================================
// Capital-gains tax
// =====================================================================

message TaxPosition {
  string user_id            = 1;
  UserKind user_kind        = 2;
  string display_name       = 3;
  string unpaid_tax_rsd     = 4;     // tax owed for the current month (15% of pending gains)
  string paid_tax_ytd_rsd   = 5;
}

message ListTaxPositionsRequest {
  UserKind user_kind  = 1;
  string   name_query = 2;
}

message ListTaxPositionsResponse {
  repeated TaxPosition positions = 1;
}

message RunTaxRequest {
  // user_id empty = run for everyone with a non-zero unpaid tax.
  string user_id   = 1;
  UserKind user_kind = 2;
}

message RunTaxResponse {
  int32 users_taxed = 1;
  string total_collected_rsd = 2;
}

// RealizedPnLRow is one closing-sell row, decorated with the security
// ticker for display. tax_amount_rsd is 15% of max(profit_rsd, 0) per
// spec p.62 (losses don't generate tax under the simple model).
message RealizedPnLRow {
  string id                          = 1;
  google.protobuf.Timestamp sale_at  = 2;
  string security_id                 = 3;
  string ticker                      = 4;
  int32  quantity                    = 5;
  string cost_basis_amt              = 6;     // native currency
  string proceeds_amt                = 7;     // native currency
  Currency currency                  = 8;     // native currency
  string profit_native               = 9;     // proceeds - cost_basis (native)
  string profit_rsd                  = 10;    // RSD-equivalent (no commission, spec p.62)
  string tax_amount_rsd              = 11;    // 15% of max(profit_rsd, 0)
  bool   taxed                       = 12;
  google.protobuf.Timestamp taxed_at = 13;
  string tax_op_id                   = 14;
  string account_id                  = 15;
}

// ListRealizedPnLRequest scopes the realised-gain ledger view.
//   user_id  is required.
//   user_kind narrows when both kinds happen to share an ID (shouldn't,
//             but kept for symmetry with tax board filters).
//   from / to clip by realised_at; either may be omitted.
message ListRealizedPnLRequest {
  string user_id                = 1;
  UserKind user_kind            = 2;
  google.protobuf.Timestamp from = 3;
  google.protobuf.Timestamp to   = 4;
}

message ListRealizedPnLResponse {
  repeated RealizedPnLRow rows = 1;
}

// =====================================================================
// OTC (c4 — spec p.64-69, 79)
// =====================================================================

enum OTCStatus {
  OTC_STATUS_UNSPECIFIED = 0;
  OTC_STATUS_OPEN        = 1;
  OTC_STATUS_SUPERSEDED  = 2;
  OTC_STATUS_ACCEPTED    = 3;
  OTC_STATUS_WITHDRAWN   = 4;
  OTC_STATUS_EXPIRED     = 5;
}

enum OTCContractStatus {
  OTC_CONTRACT_STATUS_UNSPECIFIED = 0;
  OTC_CONTRACT_STATUS_ACTIVE      = 1;
  OTC_CONTRACT_STATUS_EXERCISED   = 2;
  OTC_CONTRACT_STATUS_EXPIRED     = 3;
  OTC_CONTRACT_STATUS_SETTLING    = 4;
}

// PublicHoldingItem is one row on the OTC discovery board. The
// "available_count" field is the share count visible to negotiations —
// public_count minus reserved_count, clamped to zero.
message PublicHoldingItem {
  string                    holding_id      = 1;
  string                    seller_id       = 2;
  UserKind                  seller_kind     = 3;
  string                    seller_account_id = 4;
  string                    seller_display_name = 5;
  Security                  security        = 6;
  int32                     available_count = 7;
  int32                     public_count    = 8;
  int32                     reserved_count  = 9;
  string                    current_price   = 10;
  Currency                  currency        = 11;
  // last_updated is the holding's updated_at — spec p.67 OTC portal
  // "Last updated" column.
  google.protobuf.Timestamp last_updated    = 12;
}

message ListPublicHoldingsRequest {
  string ticker = 1;
}

message ListPublicHoldingsResponse {
  repeated PublicHoldingItem items = 1;
}

message OTCOffer {
  string                    id                = 1;
  string                    thread_id         = 2;
  string                    security_id       = 3;
  string                    security_ticker   = 4;
  string                    seller_holding_id = 5;

  string                    buyer_id          = 10;
  UserKind                  buyer_kind        = 11;
  string                    buyer_account_id  = 12;

  string                    seller_id         = 20;
  UserKind                  seller_kind       = 21;
  string                    seller_account_id = 22;

  int32                     quantity          = 30;
  string                    price_per_unit    = 31;
  string                    premium           = 32;
  Currency                  currency          = 33;
  google.protobuf.Timestamp settlement_date   = 34;

  string                    modified_by       = 40;
  OTCStatus                 status            = 41;

  google.protobuf.Timestamp created_at        = 90;
  google.protobuf.Timestamp updated_at        = 91;
}

message CreateOTCOfferRequest {
  string                    seller_holding_id = 1 [(buf.validate.field).string.uuid = true];
  string                    buyer_account_id  = 2 [(buf.validate.field).string.uuid = true];
  string                    seller_account_id = 3 [(buf.validate.field).string.uuid = true];
  int32                     quantity          = 4 [(buf.validate.field).int32.gt = 0];
  string                    price_per_unit    = 5 [(buf.validate.field).string.min_len = 1];
  string                    premium           = 6 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Timestamp settlement_date   = 7;
}

message CounterOfferOTCRequest {
  string                    thread_id         = 1 [(buf.validate.field).string.uuid = true];
  int32                     quantity          = 2 [(buf.validate.field).int32.gt = 0];
  string                    price_per_unit    = 3 [(buf.validate.field).string.min_len = 1];
  string                    premium           = 4 [(buf.validate.field).string.min_len = 1];
  google.protobuf.Timestamp settlement_date   = 5;
}

message WithdrawOTCOfferRequest {
  string thread_id = 1 [(buf.validate.field).string.uuid = true];
}

message ListOTCThreadsRequest {
  // For supervisor/admin views — narrow to a single party. Empty for
  // self.
  string party_user_id = 1;
  UserKind party_user_kind = 2;
  // "open" / "any" / "" (default "open").
  string status = 3;
}

message ListOTCThreadsResponse {
  // Latest iteration per thread. Sorted newest-first by updated_at.
  repeated OTCOffer threads = 1;
}

message GetOTCThreadRequest {
  string thread_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetOTCThreadResponse {
  // Every iteration in the thread, oldest first.
  repeated OTCOffer iterations = 1;
  // The signed contract if accept already ran.
  OTCContract contract = 2;
}

message AcceptOTCOfferRequest {
  string thread_id = 1 [(buf.validate.field).string.uuid = true];
}

message AcceptOTCOfferResponse {
  OTCContract contract = 1;
  // Bank op_id of the premium leg, for ops correlation.
  string premium_op_id = 2;
}

message OTCContract {
  string                    id                = 1;
  string                    thread_id         = 2;
  string                    security_id       = 3;
  string                    security_ticker   = 4;
  string                    seller_holding_id = 5;

  string                    buyer_id          = 10;
  UserKind                  buyer_kind        = 11;
  string                    buyer_account_id  = 12;

  string                    seller_id         = 20;
  UserKind                  seller_kind       = 21;
  string                    seller_account_id = 22;
  // Resolved display name for the seller (mirrors
  // PublicHoldingItem.seller_display_name). The FE renders this on
  // "Sklopljeni ugovori"; it fell back to the raw UUID before this.
  string                    seller_display_name = 23;

  int32                     quantity          = 30;
  string                    strike_price      = 31;
  string                    premium_paid      = 32;
  Currency                  currency          = 33;
  google.protobuf.Timestamp settlement_date   = 34;

  string                    premium_op_id     = 40;
  OTCContractStatus         status            = 41;
  string                    exercised_op_id   = 42;
  string                    exercise_saga_id  = 43;
  google.protobuf.Timestamp exercised_at      = 44;

  google.protobuf.Timestamp created_at        = 90;
  google.protobuf.Timestamp updated_at        = 91;
}

message ListOTCContractsRequest {
  // Supervisor/admin: empty user_id returns all; non-empty narrows.
  string party_user_id = 1;
  UserKind party_user_kind = 2;
  // "active"/"any"/"" (default "active").
  string status = 3;
}

message ListOTCContractsResponse {
  repeated OTCContract contracts = 1;
}

message GetOTCContractRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message ExerciseOTCContractRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message ExerciseOTCContractResponse {
  OTCContract contract = 1;
  // Bank op_id of the strike-leg cash transfer.
  string strike_op_id = 2;
  // Realized-gain row written for the seller (RSD, native).
  string seller_realized_gain_native = 3;
  string seller_realized_gain_rsd    = 4;
}

// =====================================================================
// Investment funds (c4 PR3 — spec p.71-76)
// =====================================================================

enum FundStatus {
  FUND_STATUS_UNSPECIFIED = 0;
  FUND_STATUS_ACTIVE      = 1;
  FUND_STATUS_CLOSED      = 2;
}

enum FundTransactionStatus {
  FUND_TX_STATUS_UNSPECIFIED = 0;
  FUND_TX_STATUS_PENDING     = 1;
  FUND_TX_STATUS_COMPLETED   = 2;
  FUND_TX_STATUS_FAILED      = 3;
}

// Fund is one investment-fund row. total_value_rsd + profit_rsd are
// computed at read time (liquid_rsd + holdings_value_rsd; profit =
// total_value − Σ total_invested_rsd across positions).
message Fund {
  string                    id                    = 1;
  string                    name                  = 2;
  string                    description           = 3;
  string                    manager_user_id       = 4;
  string                    manager_display_name  = 5;
  string                    bank_account_id       = 6;
  string                    bank_account_number   = 7;
  string                    minimum_contribution  = 8;
  string                    total_units           = 9;
  // Computed at read time. RSD.
  string                    liquid_rsd            = 10;
  string                    holdings_value_rsd    = 11;
  string                    total_value_rsd       = 12;
  // profit_rsd = total_value_rsd − Σ total_invested_rsd across all
  // positions. Negative when the fund is below contributed capital.
  string                    profit_rsd            = 13;
  string                    unit_price_rsd        = 14;
  FundStatus                status                = 15;
  google.protobuf.Timestamp created_at            = 16;
  google.protobuf.Timestamp updated_at            = 17;
}

message FundHolding {
  string                    holding_id           = 1;
  Security                  security             = 2;
  int32                     quantity             = 3;
  string                    weighted_avg_price   = 4;
  string                    current_price        = 5;
  string                    market_value         = 6;
  string                    profit_native        = 7;
  Currency                  currency             = 8;
  google.protobuf.Timestamp acquired_at          = 9;
  google.protobuf.Timestamp updated_at           = 10;
  // Spec p.74 fund-detail holdings columns: daily change, traded
  // volume, and the security's initial margin cost (1.1 ×
  // maintenance margin), in the holding's currency.
  string                    change_amt           = 11;
  int64                     volume               = 12;
  string                    initial_margin_cost  = 13;
}

message FundPosition {
  string                    id                      = 1;
  string                    fund_id                 = 2;
  string                    fund_name               = 3;
  string                    client_id               = 4;
  string                    units                   = 5;
  string                    total_invested_rsd      = 6;
  string                    current_value_rsd       = 7;
  // profit_rsd = current_value_rsd − total_invested_rsd. Negative when
  // the fund has lost value since the client invested.
  string                    profit_rsd              = 8;
  string                    share_pct               = 9; // 0..100
  google.protobuf.Timestamp created_at              = 10;
  google.protobuf.Timestamp updated_at              = 11;
  // Fund-level context for the client "Moji fondovi" row (spec p.75:
  // "Naziv i opis fonda, Vrednost fonda, …"). Computed at read time.
  string                    fund_description        = 12;
  string                    fund_total_value_rsd    = 13;
}

message FundTransaction {
  string                    id                          = 1;
  string                    fund_id                     = 2;
  string                    client_id                   = 3;
  string                    initiator_employee_id       = 4;
  string                    amount_rsd                  = 5;
  string                    units_delta                 = 6;
  string                    source_or_dest_account_id   = 7;
  bool                      is_inflow                   = 8;
  FundTransactionStatus     status                      = 9;
  string                    saga_id                     = 10;
  string                    failure_reason              = 11;
  google.protobuf.Timestamp created_at                  = 12;
  google.protobuf.Timestamp updated_at                  = 13;
}

message FundPerformanceSnapshot {
  google.protobuf.Timestamp snapshot_at          = 1;
  string                    liquid_rsd           = 2;
  string                    holdings_value_rsd   = 3;
  string                    total_value_rsd      = 4;
}

message ListFundsRequest {
  // status: "active" (default), "any".
  string status                    = 1;
  // Filter by manager (supervisor view).
  string manager_user_id           = 2;
  // Filter by minimum_contribution range (RSD, decimal strings).
  // Empty disables the bound.
  string min_contribution_at_least = 3;
  string min_contribution_at_most  = 4;
  // Sort: "name" (default), "total_value", "profit", "minimum_contribution".
  string sort                      = 10;
  // "asc" (default) or "desc".
  string order                     = 11;
}

message ListFundsResponse {
  repeated Fund funds = 1;
}

message GetFundRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message GetFundResponse {
  Fund                  fund     = 1;
  repeated FundHolding  holdings = 2;
  // The caller's position in this fund, when one exists. For supervisors
  // viewing the bank-as-client slice, pass `client_id` query param.
  FundPosition          position = 3;
}

message CreateFundRequest {
  string name                  = 1 [(buf.validate.field).string = {min_len: 1, max_len: 120}];
  string description           = 2 [(buf.validate.field).string.max_len = 1000];
  string minimum_contribution  = 3 [(buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$"];
  // Optional manager override (defaults to caller). Admin only.
  string manager_user_id       = 4;
}

message InvestInFundRequest {
  string id                = 1 [(buf.validate.field).string.uuid = true];
  // Investment amount in RSD — the fund's accounting unit (spec p.71
  // ClientFundTransaction.Iznos = "iznos investicije ... u RSD", and
  // minimumContribution is RSD). The server converts RSD → the source
  // account's currency for the debit (commission added on top for
  // clients, none for the bank/actuary). Mirrors WithdrawFromFundRequest.
  string amount_rsd        = 2 [(buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$"];
  // Source account. Client's own RSD/FX account, or — when supervisor
  // is investing on behalf of the bank — a bank-side RSD/FX account.
  string source_account_id = 3 [(buf.validate.field).string.uuid = true];
  // When non-empty AND caller is supervisor, the supervisor is
  // investing in the name of the bank (spec p.75 Napomena 2 — client_id
  // = BankAsClient sentinel). UUID equality with the sentinel is
  // enforced server-side.
  string on_behalf_client_id = 4;
}

message WithdrawFromFundRequest {
  string id              = 1 [(buf.validate.field).string.uuid = true];
  string amount_rsd      = 2 [(buf.validate.field).string.pattern = "^[0-9]+(\\.[0-9]{1,4})?$"];
  // Destination account. Same rules as InvestInFundRequest.
  string dest_account_id = 3 [(buf.validate.field).string.uuid = true];
  string on_behalf_client_id = 4;
  // Optional convenience: when true, server ignores `amount_rsd` and
  // withdraws the full current value of the caller's position.
  bool   withdraw_all    = 5;
}

message FundTransactionResponse {
  FundTransaction transaction = 1;
  // saga_id of the invest/withdraw saga so the FE can poll progress on
  // illiquid withdraws (PR8 tests rely on this).
  string          saga_id     = 2;
  // When true, the withdraw landed on the illiquid path (auto-liquidation
  // in progress); the transaction stays in pending until orders settle.
  bool            pending     = 3;
}

message ListFundPositionsRequest {
  // Empty client_id = caller's own positions. Supervisors/admin may
  // narrow to a specific client (or to the BankAsClient sentinel for
  // Profit Banke).
  string client_id = 1;
  // status: "active" (default, units > 0), "any".
  string status    = 2;
}

message ListFundPositionsResponse {
  repeated FundPosition positions = 1;
}

message GetFundPerformanceRequest {
  string id     = 1 [(buf.validate.field).string.uuid = true];
  // Sliding window: defaults to 30d when zero.
  int32  days   = 2 [(buf.validate.field).int32 = {gte: 0, lte: 3650}];
}

message GetFundPerformanceResponse {
  repeated FundPerformanceSnapshot snapshots = 1;
}

message ListFundTransactionsRequest {
  string id        = 1 [(buf.validate.field).string.uuid = true];
  string client_id = 2;          // narrow when caller is supervisor
  string status    = 3;          // "" / "pending" / "completed" / "failed"
  int32  page      = 10 [(buf.validate.field).int32 = {gte: 0}];
  int32  page_size = 11 [(buf.validate.field).int32 = {gte: 0, lte: 200}];
}

message ListFundTransactionsResponse {
  repeated FundTransaction transactions = 1;
  int32 page                            = 2;
  int32 page_size                       = 3;
  int64 total                           = 4;
}

// =====================================================================
// Profit Banke (c4 PR4 — spec p.76)
// =====================================================================

// ActuaryPerformance is one row on the supervisor-facing actuary
// leaderboard. profit_rsd is the sum of *positive* gain_rsd on
// realized_gains rows attributed to this actuary; losses are clamped
// to zero per row, matching the capital-gains tax cron's reading.
message ActuaryPerformance {
  string      user_id           = 1;
  string      display_name      = 2;
  ActuaryType type              = 3;
  // profit_rsd is decimal-string RSD. Always positive (negative
  // contributions are clamped to zero per row before summing).
  string      profit_rsd        = 4;
  // realized_count is the row count behind profit_rsd — useful for
  // sanity checks in the FE and the soak suite invariants.
  int64       realized_count    = 5;
}

message ListActuaryPerformancesRequest {
  // "agent" / "supervisor" / "" (default both). Mirrors actuary_info.type.
  string type       = 1;
  string name_query = 2;
}

message ListActuaryPerformancesResponse {
  repeated ActuaryPerformance rows = 1;
}

// BankFundPosition is one row on the "bank's positions in funds"
// dashboard (spec p.76 — "Pozicije banke u fondovima"). Wraps the
// underlying FundPosition with the fund's display columns so the FE
// doesn't need a second round-trip per row.
message BankFundPosition {
  FundPosition position             = 1;
  string       fund_name            = 2;
  string       manager_user_id      = 3;
  string       manager_display_name = 4;
}

message ListBankFundPositionsRequest {}

message ListBankFundPositionsResponse {
  repeated BankFundPosition rows = 1;
}

// GetBankProfitTimeseriesRequest buckets realized bank profit over a
// calendar window. `bucket` is the granularity; `from`/`to` clip
// realized_at inclusively. Both bounds are optional — when `from` is
// unset the server returns a trailing default window ending at `to`
// (or now() when `to` is unset too).
message GetBankProfitTimeseriesRequest {
  // "day" (default) / "week" / "month".
  string                    bucket = 1;
  google.protobuf.Timestamp from   = 2;
  google.protobuf.Timestamp to     = 3;
}

// BankProfitBucket is one calendar period. profit_rsd uses the same
// per-row loss clamp as the actuary leaderboard (Σ greatest(gain_rsd,
// 0) on realized_gains where user_kind='employee'), so Σ profit_rsd
// across every bucket of the full history reconciles with
// Σ ListActuaryPerformances.profit_rsd. trading_rsd + fund_rsd
// partition profit_rsd by source (realized_gains.security_id set vs
// fund_id set). cumulative_rsd is the running total from the first
// bucket in the response.
message BankProfitBucket {
  google.protobuf.Timestamp period_start   = 1;
  string                    profit_rsd     = 2;
  string                    trading_rsd    = 3;
  string                    fund_rsd       = 4;
  string                    cumulative_rsd = 5;
  int64                     realized_count = 6;
}

message GetBankProfitTimeseriesResponse {
  repeated BankProfitBucket buckets   = 1;
  // Σ profit_rsd across every returned bucket (the last bucket's
  // cumulative_rsd, or "0" when the window is empty).
  string                    total_rsd = 2;
}

message ReassignSupervisorAssetsRequest {
  string from_user_id = 1 [(buf.validate.field).string.uuid = true];
  string to_user_id   = 2 [(buf.validate.field).string.uuid = true];
}

message ReassignSupervisorAssetsResponse {
  // funds_reassigned counts active fund rows whose manager_user_id was
  // flipped. Funds already managed by `to_user_id` are not counted.
  int32 funds_reassigned = 1;
}
