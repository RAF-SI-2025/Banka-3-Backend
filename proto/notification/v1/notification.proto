syntax = "proto3";

package banka.notification.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";

// NotificationService is the centralized email-dispatch surface for
// Banka 3 (c4 PR4 NOTIFY-1). Other services dial this instead of
// importing pkg/email directly so SMTP credentials and any future
// per-recipient rate limiting live in one place. The SendEmail /
// CreateNotification RPCs are internal (service-to-service); the
// List / MarkRead RPCs are gateway-exposed so the web + mobile clients
// can render an in-app notification panel (todoSpec S19).
service NotificationService {
  // SendEmail is the generic dispatch entry point used by user-svc,
  // bank-svc, and trading-svc adapters. `kind` is an opaque tag used
  // for observability and future per-template routing; rendering
  // still happens in the caller. Templates may migrate into
  // notification-svc as typed event RPCs are added.
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);

  // CreateNotification persists one in-app notification row for a user.
  // Internal-only (no gateway route): services call it from their event
  // paths, typically alongside SendEmail. Best-effort on the caller's
  // side — a notification must never fail the business operation.
  rpc CreateNotification(CreateNotificationRequest) returns (Notification);

  // ListNotifications returns the caller's own notifications, newest
  // first. The recipient is taken from the authenticated principal in
  // gRPC metadata — never from the request — so a user can only read
  // their own feed.
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse) {
    option (google.api.http) = {get: "/api/v1/notifications"};
  }

  // MarkNotificationRead flips one of the caller's notifications to read.
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (Notification) {
    option (google.api.http) = {
      post: "/api/v1/notifications/{id}/read"
      body: "*"
    };
  }

  // MarkAllNotificationsRead flips every unread notification of the
  // caller to read and returns how many were affected.
  rpc MarkAllNotificationsRead(MarkAllNotificationsReadRequest) returns (MarkAllNotificationsReadResponse) {
    option (google.api.http) = {
      post: "/api/v1/notifications/read-all"
      body: "*"
    };
  }

  rpc Health(HealthRequest) returns (HealthResponse);
}

// EmailKind tags the originating event so the notification service can
// route, throttle, or template based on it. Open-ended — extend
// alongside new event types.
enum EmailKind {
  EMAIL_KIND_UNSPECIFIED = 0;
  EMAIL_KIND_GENERIC = 1;
  EMAIL_KIND_ACCOUNT_ACTIVATION = 2;
  EMAIL_KIND_PASSWORD_RESET = 3;
  EMAIL_KIND_PROFILE_CHANGE = 4;
  EMAIL_KIND_ACCOUNT_OPENED = 5;
  EMAIL_KIND_PAYMENT_SUCCESS = 6;
  EMAIL_KIND_CARD_STATUS = 7;
  EMAIL_KIND_LOAN_DECISION = 8;
  EMAIL_KIND_LOAN_MISSED = 9;
  EMAIL_KIND_OTC_COUNTER_OFFER = 10;
  EMAIL_KIND_OTC_ACCEPTED = 11;
  EMAIL_KIND_OTC_WITHDRAWN = 12;
  EMAIL_KIND_OTC_EXPIRED = 13;
  EMAIL_KIND_FUND_INVEST = 14;
  EMAIL_KIND_FUND_WITHDRAW = 15;
  EMAIL_KIND_FUND_HANDOVER = 16;
}

message SendEmailRequest {
  string to = 1 [(buf.validate.field).string.min_len = 3];
  string subject = 2 [(buf.validate.field).string.min_len = 1];
  string body = 3 [(buf.validate.field).string.min_len = 1];
  bool html = 4;
  EmailKind kind = 5;
  // origin_service tags the caller (e.g. "user", "bank", "trading")
  // for log-grepping. Optional.
  string origin_service = 6;
}

message SendEmailResponse {
  // message_id is a best-effort handle from the SMTP path; left empty
  // when the log-fallback sender is used.
  string message_id = 1;
}

// Notification is one in-app notification row.
message Notification {
  string id = 1;
  string user_id = 2;
  // user_kind is "client" or "employee" (matches the JWT kind claim).
  string user_kind = 3;
  // kind tags the originating event for FE icon/grouping; free-form,
  // e.g. "payment", "transfer", "card", "order", "otc". Defaults to
  // "generic".
  string kind = 4;
  string title = 5;
  string body = 6;
  // read is true once the user has seen it; read_at is the RFC3339
  // timestamp it was marked read (empty while unread).
  bool read = 7;
  string read_at = 8;
  string created_at = 9;
}

message CreateNotificationRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string user_kind = 2 [(buf.validate.field).string = {
    in: [
      "client",
      "employee"
    ]
  }];
  string kind = 3;
  string title = 4 [(buf.validate.field).string.min_len = 1];
  string body = 5 [(buf.validate.field).string.min_len = 1];
}

message ListNotificationsRequest {
  // 1-indexed; 0 is treated as 1.
  int32 page = 1 [(buf.validate.field).int32.gte = 0];
  // default 50, max 200.
  int32 page_size = 2 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
  // When true, only unread notifications are returned.
  bool unread_only = 3;
}

message ListNotificationsResponse {
  repeated Notification items = 1;
  int32 page = 2;
  int32 page_size = 3;
  // total matches the filter (all, or unread-only); unread is the
  // caller's total unread count regardless of the filter/page — the FE
  // renders it as the bell badge.
  int64 total = 4;
  int64 unread = 5;
}

message MarkNotificationReadRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message MarkAllNotificationsReadRequest {}

message MarkAllNotificationsReadResponse {
  int64 marked = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}
