name: banka

x-tools-build: &tools-build
  context: .
  dockerfile: docker/Dockerfile.tools
  args:
    UID: ${HOST_UID:-1000}
    GID: ${HOST_GID:-1000}

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: on-failure
  environment: &service-env
    DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    REDIS_ADDR: "redis:6379"
    REDIS_PASSWORD: "${REDIS_PASSWORD}"
    LOG_LEVEL: "${LOG_LEVEL:-info}"
    LOG_FORMAT: "${LOG_FORMAT:-json}"
    BANK_CODE: "${BANK_CODE:-333}"
    BANK_CVV_PEPPER: "${BANK_CVV_PEPPER:-dev-cvv-pepper-change-in-prod}"
    GRPC_PORT: "50051"
    PROBE_PORT: "8081"
    SMTP_HOST: "${SMTP_HOST:-}"
    SMTP_PORT: "${SMTP_PORT:-587}"
    SMTP_USERNAME: "${SMTP_USERNAME:-}"
    SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    SMTP_FROM: "${SMTP_FROM:-no-reply@banka.local}"
    SMTP_TLS: "${SMTP_TLS:-false}"
    CLOCK_DEBUG: "${CLOCK_DEBUG:-false}"

# App services share this depends-on block so they all wait for the
# migrate one-shot to finish before booting. Without it they'd race
# the migrations and crash on missing tables until the migrate run
# completed.
x-app-deps: &app-deps
  postgres: { condition: service_healthy }
  redis:    { condition: service_healthy }
  migrate:  { condition: service_completed_successfully }

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no --save ""
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  # Apply golang-migrate `up` across every service before app services
  # boot. Idempotent (golang-migrate is a no-op on already-applied
  # migrations) so re-running `docker compose up -d` costs ~1-2s and
  # is safe.
  migrate:
    image: banka-tools
    build: *tools-build
    working_dir: /src
    volumes:
      - .:/src
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [banka]
    restart: "no"
    command: ["bash", "scripts/db/migrate.sh", "up"]

  # Long-lived nothing — provides the toolchain image for
  # `docker compose run --rm tools <cmd>`. Profile-gated so it
  # doesn't spin up on `docker compose up`.
  tools:
    image: banka-tools
    build: *tools-build
    working_dir: /src
    volumes:
      - .:/src
      - tools-go-mod:/home/app/go/pkg/mod
      - tools-go-build:/home/app/.cache/go-build
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      INTEGRATION_DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      INTEGRATION_REDIS_ADDR: "redis:6379"
      INTEGRATION_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [banka]
    profiles: ["tools"]

  user:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user
    environment:
      <<: *service-env
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
      # c4-PR4 supervisor-demotion fund cascade: when a supervisor loses
      # funds.manage.supervisor, user-svc calls trading-svc to reassign
      # their active funds to the acting admin. Without this env the
      # cascade is silently disabled and S46 fails.
      TRADING_GRPC_ADDR: "${TRADING_GRPC_ADDR:-trading:50051}"
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
      - "${USER_PROBE_PORT:-8081}:8081"
    depends_on: *app-deps
    networks: [banka]

  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *service-env
      HTTP_PORT: "8080"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-user:50051}"
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-bank:50051}"
      TRADING_GRPC_ADDR: "${TRADING_GRPC_ADDR:-trading:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
      - "${GATEWAY_PROBE_PORT:-8086}:8081"
    networks: [banka]

  bank:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: bank
    environment:
      <<: *service-env
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-user:50051}"
    ports:
      - "${BANK_GRPC_PORT:-50052}:50051"
      - "${BANK_PROBE_PORT:-8082}:8081"
    depends_on: *app-deps
    networks: [banka]

  exchange:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: exchange
    ports:
      - "${EXCHANGE_GRPC_PORT:-50054}:50051"
      - "${EXCHANGE_PROBE_PORT:-8084}:8081"
    depends_on: *app-deps
    networks: [banka]

  notification:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50055}:50051"
      - "${NOTIFICATION_PROBE_PORT:-8085}:8081"
    depends_on: *app-deps
    networks: [banka]

  trading:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: trading
    environment:
      <<: *service-env
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-bank:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-user:50051}"
      ALPHAVANTAGE_API_KEY: "${ALPHAVANTAGE_API_KEY:-}"
      MARKET_DATA_REFRESH_INTERVAL: "${MARKET_DATA_REFRESH_INTERVAL:-6h}"
      MARKET_DATA_PAUSE: "${MARKET_DATA_PAUSE:-13s}"
      STOCK_BIDASK_SPREAD: "${STOCK_BIDASK_SPREAD:-0.001}"
      OPTIONS_REFRESH_INTERVAL: "${OPTIONS_REFRESH_INTERVAL:-24h}"
      OPTIONS_RISK_FREE_RATE: "${OPTIONS_RISK_FREE_RATE:-0.05}"
      OPTIONS_VOLATILITY: "${OPTIONS_VOLATILITY:-0.30}"
      SAGA_DEBUG_FAULT_INJECTION: "${SAGA_DEBUG_FAULT_INJECTION:-false}"
    ports:
      - "${TRADING_GRPC_PORT:-50053}:50051"
      - "${TRADING_PROBE_PORT:-8083}:8081"
    depends_on: *app-deps
    networks: [banka]

volumes:
  pgdata:
  redisdata:
  tools-go-mod:
  tools-go-build:

networks:
  banka:
    driver: bridge
