services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # Postgres 18+ stores data under /var/lib/postgresql/<major>/<cluster>
    # to support pg_ctlcluster-style upgrades. Mounting /var/lib/postgresql
    # (parent dir) instead of /var/lib/postgresql/data lets the image manage
    # the version subdirectory itself; mounting /data triggers a hard fail
    # at boot. See docker-library/postgres#1259.
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "hot_standby=on"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  postgres_replica:
    image: postgres:18-alpine
    environment:
      PGUSER: ${POSTGRES_USER}
      PGDATA: /var/lib/postgresql/18/docker
      PRIMARY_HOST: postgres
      PRIMARY_PORT: "5432"
      PRIMARY_DB: ${POSTGRES_DB}
      PRIMARY_USER: ${POSTGRES_USER}
      PRIMARY_PASSWORD: ${POSTGRES_PASSWORD}
      REPLICATION_USER: ${POSTGRES_REPLICATION_USER:-replicator}
      REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD:-replicator_pass}
      REPLICATION_SLOT: ${POSTGRES_REPLICATION_SLOT:-banka_replica_slot}
    ports:
      - "${POSTGRES_REPLICA_PORT:-5433}:5432"
    volumes:
      - pgreplicadata:/var/lib/postgresql
      - ./docker/postgres/replica/bootstrap-replica.sh:/usr/local/bin/bootstrap-replica.sh:ro
    entrypoint: ["sh", "/usr/local/bin/bootstrap-replica.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tAc 'SELECT pg_is_in_recovery()' | grep -q 't'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [banka]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  influxdb:
    image: influxdb:2.7-alpine
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-banka}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-banka_secret}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-banka}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-market-data}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-banka-influx-token}
    volumes:
      - influxdata:/var/lib/influxdb2
    networks: [banka]

  bank:
    container_name: bank
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: bank
    restart: on-failure
    ports:
      - "${BANK_GRPC_PORT:-50053}:50051"
      - "${BANK_DEBUG_HTTP_PORT:-50090}:50090"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      BANK_INTERNAL_API_KEY: ${BANK_INTERNAL_API_KEY:-dev-internal-banka3}
      INFLUX_URL: ${INFLUX_URL:-http://influxdb:8086}
      INFLUX_ORG: ${INFLUX_ORG:-banka}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-market-data}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-banka-influx-token}
      # Cypress on-demand cron trigger (cron_debug.go). Set to empty to
      # disable. Bound only on the docker-internal port; the host mapping
      # is what cypress hits at localhost:${BANK_DEBUG_HTTP_PORT}.
      BANK_DEBUG_HTTP_PORT: "50090"
      NOTIFICATION_GRPC_ADDR: ${NOTIFICATION_GRPC_ADDR:-notification:50051}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
    networks: [banka]

  exchange:
    container_name: exchange
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: exchange
    restart: on-failure
    ports:
      - "${EXCHANGE_GRPC_PORT:-50054}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      EXCHANGE_RATE_API_KEY: ${EXCHANGE_RATE_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
    networks: [banka]

  user:
    container_name: user
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user
    restart: on-failure
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      ACCESS_JWT_SECRET: ${ACCESS_JWT_SECRET}
      REFRESH_JWT_SECRET: ${REFRESH_JWT_SECRET}
      NOTIFICATION_GRPC_ADDR: ${NOTIFICATION_GRPC_ADDR:-notification:50051}
      PASSWORD_RESET_BASE_URL: ${PASSWORD_RESET_BASE_URL}
      PASSWORD_SET_BASE_URL: ${PASSWORD_SET_BASE_URL}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TOTP_DISABLE_BASE_URL: ${TOTP_DISABLE_BASE_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [banka]

  notification:
    container_name: notification
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50052}:50051"
    environment:
      BACKEND: "SMTP"
      GRPC_PORT: "50051"
      FROM_EMAIL: "${FROM_EMAIL}"
      FROM_EMAIL_AUTH: "${FROM_EMAIL_AUTH}"
      FROM_EMAIL_PASSWORD: "${FROM_EMAIL_PASSWORD}"
      FROM_EMAIL_SMTP: "${FROM_EMAIL_SMTP}"
      SMTP_ADDR: "${SMTP_ADDR}"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    networks: [banka]

  gateway:
    container_name: gateway
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      HTTP_PORT: "8080"
      USER_GRPC_ADDR: "user:50051"
      NOTIFICATION_GRPC_ADDR: "notification:50051"
      BANK_GRPC_ADDR: "bank:50051"
      EXCHANGE_GRPC_ADDR: "exchange:50051"
      TRADING_GRPC_ADDR: "bank:50051"
      INTERBANK_ROUTES: ${INTERBANK_ROUTES:-}
      INTERBANK_API_KEY: ${INTERBANK_API_KEY:-dev-outbound-banka3}
      BANK_ROUTING_NUMBER: ${BANK_ROUTING_NUMBER:-333}
      BANK_INTERNAL_HTTP_URL: ${BANK_INTERNAL_HTTP_URL:-http://bank:50090}
      BANK_INTERNAL_API_KEY: ${BANK_INTERNAL_API_KEY:-dev-internal-banka3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-text}
    depends_on:
      - user
      - notification
      - bank
      - exchange
    networks: [banka]

volumes:
  pgdata:
  pgreplicadata:
  redisdata:
  influxdata:

networks:
  banka:
    name: banka-net
