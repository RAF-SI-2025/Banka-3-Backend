name: banka

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: on-failure
  environment: &service-env
    DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    REDIS_ADDR: "redis:6379"
    REDIS_PASSWORD: "${REDIS_PASSWORD}"
    LOG_LEVEL: "${LOG_LEVEL:-info}"
    LOG_FORMAT: "${LOG_FORMAT:-json}"
    BANK_CODE: "${BANK_CODE:-333}"
    GRPC_PORT: "50051"
    PROBE_PORT: "8081"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no --save ""
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  # ===== celina 1 =====
  user:
    <<: *service-defaults
    profiles: [c1, c2, c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user
    environment:
      <<: *service-env
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
      - "${USER_PROBE_PORT:-8081}:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [banka]

  gateway:
    <<: *service-defaults
    profiles: [c1, c2, c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *service-env
      HTTP_PORT: "8080"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-user:50051}"
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-bank:50051}"
      TRADING_GRPC_ADDR: "${TRADING_GRPC_ADDR:-trading:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
      - "${GATEWAY_PROBE_PORT:-8086}:8081"
    networks: [banka]

  # ===== celina 2 — bank, exchange, notification =====
  bank:
    <<: *service-defaults
    profiles: [c2, c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: bank
    environment:
      <<: *service-env
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
    ports:
      - "${BANK_GRPC_PORT:-50052}:50051"
      - "${BANK_PROBE_PORT:-8082}:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [banka]

  exchange:
    <<: *service-defaults
    profiles: [c2, c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: exchange
    environment:
      <<: *service-env
      EXCHANGE_RATE_API_KEY: "${EXCHANGE_RATE_API_KEY}"
      ALPHA_VANTAGE_API_KEY: "${ALPHA_VANTAGE_API_KEY}"
    ports:
      - "${EXCHANGE_GRPC_PORT:-50054}:50051"
      - "${EXCHANGE_PROBE_PORT:-8084}:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [banka]

  notification:
    <<: *service-defaults
    profiles: [c2, c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50055}:50051"
      - "${NOTIFICATION_PROBE_PORT:-8085}:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [banka]

  # ===== celina 3+ =====
  trading:
    <<: *service-defaults
    profiles: [c3, c4, all]
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: trading
    environment:
      <<: *service-env
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-bank:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-exchange:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-notification:50051}"
    ports:
      - "${TRADING_GRPC_PORT:-50053}:50051"
      - "${TRADING_PROBE_PORT:-8083}:8081"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [banka]

volumes:
  pgdata:
  redisdata:

networks:
  banka:
    driver: bridge
