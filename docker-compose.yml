name: banka

x-tools-build: &tools-build
  context: .
  dockerfile: docker/Dockerfile.tools
  args:
    UID: ${HOST_UID:-1000}
    GID: ${HOST_GID:-1000}

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: on-failure
  environment: &service-env
    DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@banka-postgres-1:5432/${POSTGRES_DB}?sslmode=disable"
    REDIS_ADDR: "banka-redis-1:6379"
    REDIS_PASSWORD: "${REDIS_PASSWORD}"
    LOG_LEVEL: "${LOG_LEVEL:-info}"
    LOG_FORMAT: "${LOG_FORMAT:-json}"
    BANK_CODE: "${BANK_CODE:-333}"
    BANK_CVV_PEPPER: "${BANK_CVV_PEPPER:-dev-cvv-pepper-change-in-prod}"
    GRPC_PORT: "50051"
    PROBE_PORT: "8081"
    SMTP_HOST: "${SMTP_HOST:-}"
    SMTP_PORT: "${SMTP_PORT:-587}"
    SMTP_USERNAME: "${SMTP_USERNAME:-}"
    SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    SMTP_FROM: "${SMTP_FROM:-no-reply@banka.local}"
    SMTP_TLS: "${SMTP_TLS:-false}"
    CLOCK_DEBUG: "${CLOCK_DEBUG:-false}"

# App services share this depends-on block so they all wait for the
# migrate one-shot to finish before booting. Without it they'd race
# the migrations and crash on missing tables until the migrate run
# completed.
x-app-deps: &app-deps
  postgres: { condition: service_healthy }
  redis:    { condition: service_healthy }
  migrate:  { condition: service_completed_successfully }

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_REPLICATION_USER: "${POSTGRES_REPLICATION_USER:-replicator}"
      POSTGRES_REPLICATION_PASSWORD: "${POSTGRES_REPLICATION_PASSWORD:-replicator_pass}"
      POSTGRES_REPLICATION_SLOT: "${POSTGRES_REPLICATION_SLOT:-banka_replica_slot}"
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql
      # Replication setup script — registers the replicator role +
      # physical replication slot when /docker-entrypoint-initdb.d
      # fires on first boot. Idempotent; the bootstrap script on the
      # replica side reruns it via the primary connection if needed.
      # BonusPartitionReplication / PR #286.
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=5"
      - "-c"
      - "max_replication_slots=5"
      - "-c"
      - "hot_standby=on"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  # postgres_replica is profile-gated — `make replica` brings it up
  # and bootstraps it from the primary. Apps continue to talk to the
  # primary (DATABASE_URL) by default; routing reads to the replica
  # is handled by the read-replica-router bonus (#287).
  postgres_replica:
    profiles: ["replica"]
    image: postgres:18-alpine
    environment:
      PGUSER: "${POSTGRES_USER}"
      PGDATA: /var/lib/postgresql/18/docker
      PRIMARY_HOST: banka-postgres-1
      PRIMARY_PORT: "5432"
      PRIMARY_DB: "${POSTGRES_DB}"
      PRIMARY_USER: "${POSTGRES_USER}"
      PRIMARY_PASSWORD: "${POSTGRES_PASSWORD}"
      REPLICATION_USER: "${POSTGRES_REPLICATION_USER:-replicator}"
      REPLICATION_PASSWORD: "${POSTGRES_REPLICATION_PASSWORD:-replicator_pass}"
      REPLICATION_SLOT: "${POSTGRES_REPLICATION_SLOT:-banka_replica_slot}"
    ports:
      - "${POSTGRES_REPLICA_PORT:-5433}:5432"
    volumes:
      - pgreplicadata:/var/lib/postgresql
      - ./docker/postgres/replica/bootstrap-replica.sh:/usr/local/bin/bootstrap-replica.sh:ro
    entrypoint: ["sh", "/usr/local/bin/bootstrap-replica.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -tAc 'SELECT pg_is_in_recovery()' | grep -q 't'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [banka]

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly no --save ""
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks: [banka]

  # Apply golang-migrate `up` across every service before app services
  # boot. Idempotent (golang-migrate is a no-op on already-applied
  # migrations) so re-running `docker compose up -d` costs ~1-2s and
  # is safe.
  migrate:
    image: banka-tools
    build: *tools-build
    working_dir: /src
    volumes:
      - .:/src
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@banka-postgres-1:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [banka]
    restart: "no"
    command: ["bash", "scripts/db/migrate.sh", "up"]

  # Long-lived nothing — provides the toolchain image for
  # `docker compose run --rm tools <cmd>`. Profile-gated so it
  # doesn't spin up on `docker compose up`.
  tools:
    image: banka-tools
    build: *tools-build
    working_dir: /src
    volumes:
      - .:/src
      - tools-go-mod:/home/app/go/pkg/mod
      - tools-go-build:/home/app/.cache/go-build
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      INTEGRATION_DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      INTEGRATION_REDIS_ADDR: "redis:6379"
      INTEGRATION_REDIS_PASSWORD: "${REDIS_PASSWORD}"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [banka]
    profiles: ["tools"]

  user:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: user
    environment:
      <<: *service-env
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-banka-notification-1:50051}"
      # c4-PR4 supervisor-demotion fund cascade: when a supervisor loses
      # funds.manage.supervisor, user-svc calls trading-svc to reassign
      # their active funds to the acting admin. Without this env the
      # cascade is silently disabled and S46 fails.
      TRADING_GRPC_ADDR: "${TRADING_GRPC_ADDR:-banka-trading-1:50051}"
    ports:
      - "${USER_GRPC_PORT:-50051}:50051"
      - "${USER_PROBE_PORT:-8081}:8081"
    depends_on: *app-deps
    networks: [banka]

  gateway:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: gateway
    environment:
      <<: *service-env
      HTTP_PORT: "8080"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-banka-user-1:50051}"
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-banka-bank-1:50051}"
      TRADING_GRPC_ADDR: "${TRADING_GRPC_ADDR:-banka-trading-1:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-banka-exchange-1:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-banka-notification-1:50051}"
      # Celina 5 — inbound partner REST routes are gated by this key.
      INTERBANK_API_KEY: "${INTERBANK_API_KEY:-dev-outbound-banka3}"
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
      - "${GATEWAY_PROBE_PORT:-8086}:8081"
    networks: [banka]

  bank:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: bank
    environment:
      <<: *service-env
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-banka-exchange-1:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-banka-notification-1:50051}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-banka-user-1:50051}"
    ports:
      - "${BANK_GRPC_PORT:-50052}:50051"
      - "${BANK_PROBE_PORT:-8082}:8081"
    depends_on: *app-deps
    networks: [banka]

  exchange:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: exchange
    ports:
      - "${EXCHANGE_GRPC_PORT:-50054}:50051"
      - "${EXCHANGE_PROBE_PORT:-8084}:8081"
    depends_on: *app-deps
    networks: [banka]

  notification:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: notification
    ports:
      - "${NOTIFICATION_GRPC_PORT:-50055}:50051"
      - "${NOTIFICATION_PROBE_PORT:-8085}:8081"
    depends_on: *app-deps
    networks: [banka]

  trading:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: trading
    environment:
      <<: *service-env
      BANK_GRPC_ADDR: "${BANK_GRPC_ADDR:-banka-bank-1:50051}"
      EXCHANGE_GRPC_ADDR: "${EXCHANGE_GRPC_ADDR:-banka-exchange-1:50051}"
      NOTIFICATION_GRPC_ADDR: "${NOTIFICATION_GRPC_ADDR:-banka-notification-1:50051}"
      USER_GRPC_ADDR: "${USER_GRPC_ADDR:-banka-user-1:50051}"
      ALPHAVANTAGE_API_KEY: "${ALPHAVANTAGE_API_KEY:-}"
      MARKET_DATA_REFRESH_INTERVAL: "${MARKET_DATA_REFRESH_INTERVAL:-6h}"
      MARKET_DATA_PAUSE: "${MARKET_DATA_PAUSE:-13s}"
      STOCK_BIDASK_SPREAD: "${STOCK_BIDASK_SPREAD:-0.001}"
      OPTIONS_REFRESH_INTERVAL: "${OPTIONS_REFRESH_INTERVAL:-24h}"
      OPTIONS_RISK_FREE_RATE: "${OPTIONS_RISK_FREE_RATE:-0.05}"
      OPTIONS_VOLATILITY: "${OPTIONS_VOLATILITY:-0.30}"
      SAGA_DEBUG_FAULT_INJECTION: "${SAGA_DEBUG_FAULT_INJECTION:-false}"
      # Celina 5 — outbound cross-bank OTC. Defaults to BOTH the
      # bundled mock-partner (bank 999) AND a sibling Banka 3 instance
      # (bank 334 — only reachable when `make up-partner` has brought
      # up the partner compose project). Discover() silently logs a
      # warning if the second route doesn't resolve, so the default
      # works whether the partner is up or not.
      BANK_ROUTING_NUMBER: "${BANK_ROUTING_NUMBER:-333}"
      INTERBANK_ROUTES: "${INTERBANK_ROUTES:-999:http://mock-partner:9099,334:http://banka-partner-gateway-1:8080}"
      INTERBANK_API_KEY: "${INTERBANK_API_KEY:-dev-outbound-banka3}"
    ports:
      - "${TRADING_GRPC_PORT:-50053}:50051"
      - "${TRADING_PROBE_PORT:-8083}:8081"
    depends_on: *app-deps
    networks: [banka]

  # Celina 5 — bundled mock partner bank for the dev stack. Serves the
  # native protocol on /bank/api/v1/otc/... so trading can demo the
  # cross-bank flow without a second real instance. Authenticates with
  # the same INTERBANK_API_KEY as our gateway so both directions agree.
  # ---------------------------------------------------------------------
  # InfluxDB — optional time-series side-channel for market data
  # (BonusInfluxDB / PR #285). Profile-gated so `make up` skips it.
  # Bring up with `make influxdb` to opt in to the mirror writes; the
  # trading service reads INFLUX_URL etc on boot and silently no-ops
  # when those env vars are unset.
  # ---------------------------------------------------------------------
  influxdb:
    profiles: ["influxdb"]
    image: influxdb:2.7-alpine
    ports:
      - "${INFLUX_PORT:-8087}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUX_USERNAME:-admin}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUX_PASSWORD:-influxpass}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUX_ORG:-banka}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUX_BUCKET:-market-data}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUX_TOKEN:-dev-influx-token-change-in-prod}"
    volumes:
      - influxdata:/var/lib/influxdb2
    networks: [banka]

  mock-partner:
    <<: *service-defaults
    build:
      context: .
      dockerfile: tools/mock-partner/Dockerfile
    environment:
      PORT: "9099"
      BANK_ROUTING_NUMBER: "999"
      INTERBANK_API_KEY: "${INTERBANK_API_KEY:-dev-outbound-banka3}"
    ports:
      - "${MOCK_PARTNER_PORT:-9099}:9099"
    networks: [banka]

  # ---------------------------------------------------------------------
  # Observability — Prometheus + Grafana + Alertmanager + Discord
  # notifier. Profile-gated so `make up` skips them; bring up with
  # `make observability` (or `docker compose --profile observability up`).
  # Ported from main branch's BonusMLAObservability (PR #292) and
  # adapted to the rewrite's container naming.
  # ---------------------------------------------------------------------
  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v3.7.3
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks: [banka]

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:12.2.0
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks: [banka]

  alertmanager:
    profiles: ["observability"]
    image: prom/alertmanager:v0.28.1
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    depends_on:
      - discord_notifier
    networks: [banka]

  discord_notifier:
    profiles: ["observability"]
    build:
      context: .
      dockerfile: monitoring/discord-notifier/Dockerfile
    environment:
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      PORT: "8080"
    networks: [banka]

volumes:
  pgdata:
  pgreplicadata:
  redisdata:
  tools-go-mod:
  tools-go-build:
  influxdata:

networks:
  banka:
    name: banka
    driver: bridge
