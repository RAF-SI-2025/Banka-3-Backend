global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:9100"]

  - job_name: user
    static_configs:
      - targets: ["user:9101"]

  - job_name: notification
    static_configs:
      - targets: ["notification:9102"]

  - job_name: bank
    static_configs:
      - targets: ["bank:9103"]

  - job_name: exchange
    static_configs:
      - targets: ["exchange:9104"]
