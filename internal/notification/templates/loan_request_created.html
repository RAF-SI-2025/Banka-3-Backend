<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    .container {
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      max-width: 500px;
      margin: auto;
      text-align: center;
    }

    .info-badge {
      display: inline-block;
      padding: 8px 16px;
      background-color: #e8f0fe;
      color: #174ea6;
      border-radius: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .info {
      color: #555;
      line-height: 1.6;
    }
  </style>
  <title>banka 3</title>
</head>
<body>
<div class="container">
  <div class="info-badge">ZAHTEV PRIMLJEN</div>
  <h2 style="color: #333;">Primili smo vas zahtev za kredit</h2>
  <p class="info">
    Vas zahtev za kredit je uspesno evidentiran u sistemu Banke 3.
  </p>
  <p class="info">
    Zahtev je trenutno na obradi. O daljim koracima bicete obavesteni nakon sto pregled bude zavrsen.
  </p>
  <p style="margin-top: 30px; font-weight: bold; color: #0052cc;">Vasa Banka 3</p>
</div>
</body>
</html>
